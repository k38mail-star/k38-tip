# K38 波波鸡 nginx 配置
# 放到 /etc/nginx/sites-enabled/k38.conf 或 include 进主配置

server {
    listen 80;
    server_name tip.k38.ai boboji.beer;

    # P3-17: gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/html
        text/css
        text/plain
        text/xml
        application/json
        application/javascript
        application/xml
        image/svg+xml;

    # P3-18: Static asset caching
    location /static/ {
        alias /opt/k38/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
