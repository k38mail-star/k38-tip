name: 自动部署到新加坡服务器

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装测试依赖
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium

      - name: SSH到服务器并部署
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 47.82.162.85
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/k38-tip
            git stash
            git pull origin main
            pip3 install -q flask numpy 2>/dev/null || true
            systemctl restart k38-tip
            echo "✅ $(date +%T) 部署完成"

      - name: 视觉测试
        run: |
          echo "等待服务启动..."
          sleep 10
          node tests/visual_test.js
        env:
          TEST_URL: https://boboji.beer/

      - name: 上传截图（通过时）
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-pass
          path: screenshot.png

      - name: 上传截图（失败时）
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-fail
          path: screenshot_failed.png
