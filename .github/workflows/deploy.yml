name: 自动部署到新加坡服务器

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装测试依赖
        run: |
          npm ci

      - name: SSH到服务器并部署
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 47.82.162.85
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/k38-tip
            git stash
            git pull origin main
            pip3 install -q flask numpy 2>/dev/null || true
            systemctl restart k38-tip
            echo "✅ $(date +%T) 部署完成"

      - name: 运行部署后检查
        run: |
          echo "等待服务启动..."
          sleep 10
          bash post-deploy-check.sh
        env:
          DEPLOY_URL: https://boboji.beer/

      - name: 运行Playwright视觉测试
        run: npx playwright test --reporter=list

      - name: 上传测试报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
