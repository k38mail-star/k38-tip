<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>K38 ⚽ 智荐</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0d0f14;color:#e8e4f0;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','SF Pro',sans-serif;padding:24px 14px 80px;max-width:480px;margin:0 auto;-webkit-font-smoothing:antialiased}
  h1{font-size:18px;font-weight:700;margin-bottom:20px;color:#c8b8e8;letter-spacing:-.3px}
  h1 span{color:#7c5cbf}
  .tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:16px}
  .tag{padding:5px 10px;border-radius:8px;border:1px solid #2a2040;font-size:11px;cursor:pointer;color:#8b7fa0;transition:.15s;user-select:none;background:linear-gradient(135deg,#161122,#1a1428)}
  .tag:hover{border-color:#5c4090;color:#c8b8e8}
  .tag.sel{border-color:#7c5cbf;color:#c8b8e8;background:linear-gradient(135deg,#1e1440,#241850);box-shadow:0 0 12px rgba(124,92,191,.15)}
  .dates{display:flex;gap:6px;margin-bottom:20px}
  .date{flex:1;padding:10px 6px;border-radius:10px;border:1px solid #2a2040;background:linear-gradient(135deg,#161122,#1a1428);font-size:12px;cursor:pointer;text-align:center;color:#8b7fa0;transition:.15s}
  .date:hover{border-color:#5c4090}
  .date.sel{border-color:#7c5cbf;color:#c8b8e8;background:linear-gradient(135deg,#1e1440,#241850);box-shadow:0 0 16px rgba(124,92,191,.2)}
  .date .cnt{font-size:9px;color:#6a5a80;margin-top:2px;display:block}
  .ld{display:none;text-align:center;padding:32px;color:#6a5a80;font-size:12px}
  .ld.s{display:block}
  .ld::after{content:'...';animation:d 1.2s steps(4) infinite}
  @keyframes d{0%{content:''}25%{content:'.'}50%{content:'..'}75%{content:'...'}}
  .legend{display:none;font-size:9px;color:#6a5a80;padding:4px 2px 6px;border-bottom:1px solid #2a2040;margin-bottom:6px;justify-content:space-between}
  .legend.s{display:flex}
  .ml{display:none}
  .ml.s{display:block}
  .mc{background:linear-gradient(135deg,#161122,#1a1428);border:1px solid #2a2040;border-radius:10px;margin-bottom:4px;cursor:pointer;transition:.15s;padding:10px 12px}
  .mc:hover{border-color:#3c3060}
  .mc.sel{border-color:#7c5cbf;box-shadow:0 0 12px rgba(124,92,191,.08)}
  .mc-row{display:flex;align-items:center;gap:8px}
  .ck{width:18px;height:18px;border-radius:6px;border:2px solid #3c3060;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;color:transparent;cursor:pointer;transition:.15s}
  .ck.on{background:#7c5cbf;border-color:#7c5cbf;color:#fff;box-shadow:0 0 8px rgba(124,92,191,.3)}
  .mc-teams{flex:1;display:flex;align-items:center;justify-content:space-between;gap:4px;min-width:0}
  .mc-t{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;min-width:0}
  .mc-t-flag{font-size:18px;line-height:1}
  .mc-t-name{font-size:13px;font-weight:500;color:#e8e4f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
  .mc-vs{font-size:10px;color:#4a3a60;flex-shrink:0;padding:0 4px}
  .mc-rec{font-size:9px;font-weight:500;padding:2px 8px;border-radius:4px;white-space:nowrap;margin-top:2px;display:inline-flex;align-items:center;gap:3px}
  .mc-rec-home{background:rgba(124,92,191,.15);color:#a080d8}
  .mc-rec-away{background:rgba(88,130,255,.15);color:#6a8fff}
  .mc-rec-draw{background:rgba(210,160,96,.15);color:#d4a060}
  .mc-rec .ai-tag{font-size:7px;background:rgba(255,255,255,.1);padding:1px 4px;border-radius:2px;letter-spacing:.3px}
  .mc-info{text-align:right;flex-shrink:0;font-size:10px;color:#8b7fa0;line-height:1.4}
  .mc-info .vl{font-weight:600;color:#a080d8;font-size:13px}
  .mc-info .lb{font-size:8px;color:#6a5a80;display:block;margin-bottom:1px}

  /* Bigger bottom bar */
  .bb{display:none;position:fixed;bottom:0;left:0;right:0;background:linear-gradient(135deg,#120e20,#1a1440);border-top:1px solid #2a2040;padding:12px 16px;z-index:100;backdrop-filter:blur(8px)}
  .bb.s{display:block}
  .bi{max-width:480px;margin:0 auto;display:flex;align-items:center;gap:12px}

  /* Left info area */
  .bl{flex:1}
  .bl-cnt{font-size:13px;color:#c8b8e8}
  .bl-cnt span{color:#a080d8;font-weight:700;font-size:16px}
  .bl-sub{font-size:10px;color:#6a5a80;margin-top:2px;display:flex;gap:8px}
  .bl-sub .hl{color:#7c5cbf;font-weight:500}

  /* Big button */
  .bbtn{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px 28px;border-radius:12px;border:none;background:linear-gradient(135deg,#7c5cbf,#5c3c9f);color:#fff;cursor:pointer;box-shadow:0 4px 16px rgba(124,92,191,.3);min-width:140px;transition:.15s}
  .bbtn:disabled{opacity:.25;box-shadow:none;cursor:default}
  .bbtn:active:not(:disabled){transform:scale(.97)}
  .bbtn .b-icon{font-size:16px}
  .bbtn .b-label{font-size:13px;font-weight:700;letter-spacing:.3px;margin-top:2px}
  .bbtn .b-sub{font-size:9px;font-weight:400;opacity:.7;margin-top:1px}
</style>
</head>
<body>
<h1>⚽ <span>今天买什么？</span></h1>
<div class="tags" id="tags"></div>
<div class="dates" id="dates"></div>
<div class="ld" id="ld">加载中</div>
<div class="legend" id="legend"><span>🤖 AI 推荐 · 信心指数</span><span>⚡ 越高越可靠</span></div>
<div class="ml" id="ml"></div>

<div class="bb" id="bb">
  <div class="bi">
    <div class="bl">
      <div class="bl-cnt">已选 <span id="sc">0</span> 场</div>
      <div class="bl-sub"><span class="hl" id="estReturn">—</span></div>
    </div>
    <button class="bbtn" id="gb" disabled>
      <span class="b-icon">🎯</span>
      <span class="b-label">AI 串关</span>
      <span class="b-sub" id="btnSub">选 2+ 场开始</span>
    </button>
  </div>
</div>

<script>
const LG=[
  {k:'wc',id:1,l:'世界杯',f:'🌍'},
  {k:'epl',id:39,l:'英超',f:'🏴󠁧󠁢󠁥󠁮󠁧󠁿'},
  {k:'la',id:140,l:'西甲',f:'🇪🇸'},
  {k:'sa',id:135,l:'意甲',f:'🇮🇹'},
  {k:'bl',id:78,l:'德甲',f:'🇩🇪'},
  {k:'l1',id:61,l:'法甲',f:'🇫🇷'},
];
const st={leagues:new Set(['wc']),picks:new Set(),matches:[]};

function init(){
  const tg=document.getElementById('tags');
  LG.forEach((l,i)=>{
    const e=document.createElement('span');e.className='tag'+(i===0?' sel':'');
    e.innerHTML=l.f+'&nbsp;'+l.l;
    e.onclick=()=>{
      e.classList.toggle('sel');
      if(e.classList.contains('sel'))st.leagues.add(l.k);else st.leagues.delete(l.k);
      if(!st.leagues.size){st.leagues.add('wc');document.querySelector('.tag').classList.add('sel')}
      const sel=document.querySelector('.date.sel');
      if(sel)sel.click();
    };
    tg.appendChild(e);
  });
  const dd=document.getElementById('dates');
  [{l:'今天',d:0},{l:'3天',d:2},{l:'5天',d:4},{l:'7天',d:6}].forEach(r=>{
    const e=document.createElement('div');e.className='date';
    e.innerHTML=r.l+'<span class="cnt"></span>';
    e.onclick=()=>{document.querySelectorAll('.date').forEach(b=>b.classList.remove('sel'));e.classList.add('sel');load(r)};
    dd.appendChild(e);
  });
  document.querySelector('.date').click();
}

function load(r){
  const ld=document.getElementById('ld');const ml=document.getElementById('ml');const lg=document.getElementById('legend');
  ld.classList.add('s');ml.classList.remove('s');ml.innerHTML='';lg.classList.remove('s');
  const n=new Date();const t=new Date(n);t.setDate(t.getDate()+r.d);
  const f=d=>d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  const lids=[...st.leagues].map(k=>LG.find(l=>l.k===k).id);
  fetch('/api/candidates?date_from='+f(n)+'&date_to='+f(t)+'&leagues='+lids.join(',')).then(r=>r.json()).then(d=>{
    ld.classList.remove('s');st.matches=d.matches||[];st.picks=new Set();render();
  }).catch(()=>{ld.classList.remove('s');ml.innerHTML='<div style="padding:32px;text-align:center;color:#6a5a80;font-size:12px">加载失败</div>';ml.classList.add('s')});
}

function render(){
  const ml=document.getElementById('ml');ml.innerHTML='';
  const lg=document.getElementById('legend');
  const bb=document.getElementById('bb');
  if(!st.matches.length){ml.innerHTML='<div style="padding:32px;text-align:center;color:#6a5a80;font-size:12px">暂无推荐比赛</div>';ml.classList.add('s');lg.classList.remove('s');bb.classList.remove('s');return}
  ml.classList.add('s');lg.classList.add('s');bb.classList.add('s');
  st.matches.forEach((m,i)=>{
    const p=m.prediction;const ih=p==='主胜';const ia=p==='客胜';const id=p==='平局';
    let odds=null;if(m.odds){if(ih)odds=m.odds.home_odds;else if(ia)odds=m.odds.away_odds;else if(id)odds=m.odds.draw_odds}
    const ed=m.odds&&m.odds.edge_pct;
    const hF=m.home_flag||'⚽';const aF=m.away_flag||'⚽';
    const hN=m.home_cn||m.home;const aN=m.away_cn||m.away;
    let rc=ia?'mc-rec-away':(id?'mc-rec-draw':'mc-rec-home');
    let aiTag='<span class="ai-tag">AI</span>';
    let bd='';
    if(id){
      bd='<div class="mc-rec '+rc+'">'+aiTag+' ⚖️ '+p+(odds?' @'+odds:'')+(ed?' +'+ed+'%':'')+'</div>';
    } else {
      bd='<div class="mc-rec '+rc+'">'+aiTag+' 🏆 '+p+(odds?' @'+odds:'')+(ed?' +'+ed+'%':'')+'</div>';
    }
    const row=document.createElement('div');row.className='mc sel';
    if(id){
      row.innerHTML='<div class="mc-row"><div class="ck on">✓</div><div class="mc-teams"><div class="mc-t"><span class="mc-t-flag">'+hF+'</span><span class="mc-t-name">'+hN+'</span></div><div class="mc-vs">VS</div><div class="mc-t"><span class="mc-t-flag">'+aF+'</span><span class="mc-t-name">'+aN+'</span></div></div><div class="mc-info"><span class="lb">信心</span><div class="vl">'+m.confidence+'%</div></div></div><div style="text-align:center;margin-top:4px">'+bd+'</div>';
    } else {
      row.innerHTML='<div class="mc-row"><div class="ck on">✓</div><div class="mc-teams"><div class="mc-t"><span class="mc-t-flag">'+hF+'</span><span class="mc-t-name">'+hN+'</span>'+(ih?bd:'')+'</div><div class="mc-vs">VS</div><div class="mc-t"><span class="mc-t-flag">'+aF+'</span><span class="mc-t-name">'+aN+'</span>'+(ia?bd:'')+'</div></div><div class="mc-info"><span class="lb">信心</span><div class="vl">'+m.confidence+'%</div></div></div>';
    }
    const ck=row.querySelector('.ck');
    ck.onclick=e=>{e.stopPropagation();ck.classList.toggle('on');ck.textContent=ck.classList.contains('on')?'✓':'';if(ck.classList.contains('on'))st.picks.add(m.id);else st.picks.delete(m.id);up()};
    row.onclick=()=>ck.click();
    ml.appendChild(row);st.picks.add(m.id);
  });up();
}

function up(){
  const n=st.picks.size;
  document.getElementById('sc').textContent=n;
  document.getElementById('gb').disabled=n<2;
  const sub=document.getElementById('btnSub');
  const est=document.getElementById('estReturn');
  if(n<2){sub.textContent='选 2+ 场开始';est.textContent='—';}
  else{sub.textContent=n+'场组合 · '+(n==2?'2串1':n+'串1');est.textContent='🎯 '+(n==2?'2串1':n+'串1');}
}
init();
</script>
</body>
</html>
