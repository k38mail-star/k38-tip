  .disclaimer{position:fixed;bottom:0;left:0;right:0;text-align:center;font-size:9px;color:#3c3050;padding:4px;background:rgba(13,15,20,.8);z-index:99;backdrop-filter:blur(4px)}

  .theme-toggle{position:fixed;top:12px;right:12px;z-index:200;background:rgba(22,17,34,.6);border:1px solid #2a2040;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;backdrop-filter:blur(4px);transition:.15s}

</style>

// Hot teams (big clubs / high-attraction matches)
const HOT_TEAMS=new Set([
  'Brazil','Argentina','France','England','Germany','Spain','Netherlands','Portugal','Italy',
  'Real Madrid','Barcelona','Liverpool','Man United','Manchester City','Arsenal','Chelsea',
  'Bayern','Juventus','Milan','Inter','PSG','Ajax',
  '巴西','阿根廷','法国','英格兰','德国','西班牙','荷兰','葡萄牙','意大利',
]);
const ALL_LEAGUES=[...LG,...LG_MORE];
const st={leagues:new Set(),picks:new Set(),matches:[]};

// Load saved preferences
function loadPrefs(){
  try{
    const saved=JSON.parse(localStorage.getItem('k38_leagues')||'["wc"]');
    saved.forEach(k=>{if(ALL_LEAGUES.find(l=>l.k===k))st.leagues.add(k)});
  }catch(e){st.leagues.add('wc')}
  if(!st.leagues.size)st.leagues.add('wc');
}

// Save preferences
function savePrefs(){
  try{localStorage.setItem('k38_leagues',JSON.stringify([...st.leagues]))}catch(e){}
}
// Debounce for league switching - also update date counts
let _debounceTimer=null;
function debounceLoad(){
  // Reset count displays
  document.querySelectorAll('.date .cnt').forEach(el=>{el.textContent='—'});
  clearTimeout(_debounceTimer);
  _debounceTimer=setTimeout(()=>{
    const sel=document.querySelector('.date.sel');
    if(sel)sel.click();
  },300);
}

// Format date labels
function fmtDateLabel(days){
  const d=new Date();d.setDate(d.getDate()+days);
  return (d.getMonth()+1)+'月'+d.getDate()+'日';
}

// Real-time clock
function startClock(){
  function tick(){
    const d=new Date();
    const h=String(d.getHours()).padStart(2,'0');
    const m=String(d.getMinutes()).padStart(2,'0');
    const el=document.getElementById('timeDisplay');
    if(el)el.textContent=h+':'+m;
  }
  tick();
  setInterval(tick,10000);
}

// Get timezone offset string
function getTZ(){
  const offset=-new Date().getTimezoneOffset();
  const h=Math.floor(Math.abs(offset)/60);
  const sign=offset>=0?'+':'-';
  return 'UTC'+sign+h;
}

function init(){
  loadPrefs();
  // Set timezone
  const tzEl=document.getElementById('tzDisplay');
  if(tzEl)tzEl.textContent=getTZ();
  startClock();
  const tg=document.getElementById('tags');
  let _showMore=false;
  
  function renderTags(){
    tg.innerHTML='';
    const activeLeagues=_showMore?ALL_LEAGUES:LG;
    activeLeagues.forEach(l=>{
      const e=document.createElement('span');e.className='tag'+(st.leagues.has(l.k)?' sel':'');
      e.innerHTML=l.f+'&nbsp;'+l.l;
      e.onclick=()=>toggleOne(l.k);
      tg.appendChild(e);
    });
    // 更多/收起按钮
    if(!_showMore){
      const moreBtn=document.createElement('span');moreBtn.className='tag';moreBtn.textContent='更多 ▶';
      moreBtn.onclick=()=>{_showMore=true;renderTags()};
      tg.appendChild(moreBtn);
    } else {
      // 全选按钮
      const allSel=st.leagues.size===ALL_LEAGUES.length;
      const allBtn=document.createElement('span');allBtn.className='tag'+(allSel?' sel':'');
      allBtn.textContent=allSel?'✓ 全选':'全选';
      allBtn.onclick=()=>{
        ALL_LEAGUES.forEach(l=>st.leagues.add(l.k));
        savePrefs();renderTags();debounceLoad();
      };
      tg.appendChild(allBtn);
      // 收起按钮
      const foldBtn=document.createElement('span');foldBtn.className='tag';foldBtn.textContent='▲ 收起';
      foldBtn.onclick=()=>{_showMore=false;renderTags()};
      tg.appendChild(foldBtn);
    }
  }
  
  function toggleOne(k){
    if(st.leagues.has(k))st.leagues.delete(k);else st.leagues.add(k);
    if(!st.leagues.size){st.leagues.add('wc')}
    savePrefs();renderTags();debounceLoad();
  }
  
  renderTags();
  [{l:'今天',d:0},{l:'3天',d:2},{l:'5天',d:4},{l:'7天',d:6}].forEach(r=>{const e=document.createElement('div');e.className='date';e.innerHTML=r.l+'<span class="cnt" style="font-size:8px;color:#6a5a80">'+fmtDateLabel(r.d)+'</span>';
    e.onclick=()=>{document.querySelectorAll('.date').forEach(b=>b.classList.remove('sel'));e.classList.add('sel');load(r)};document.getElementById('dates').appendChild(e)});
  document.querySelector('.date').click();
  document.getElementById('gb').onclick=startAnim;
  // P2-11: AI auto-recommend button
  document.getElementById('autoBtn').onclick=function(){
    // Use all matches with confidence > 60%, or all if picks exist
    let ids;
    if(st.picks.size>=2){
      ids=[...st.picks];
    } else {
      ids=st.matches.filter(m=>m.confidence>=60).map(m=>m.id);
      if(ids.length<2) ids=st.matches.slice(0,10).map(m=>m.id);
    }
    if(ids.length<2){showToast('⚠️ 至少需要2场比赛');return}
    const overlay=document.getElementById('animOverlay');
    const result=document.getElementById('animResult');
    overlay.classList.add('s');result.classList.add('s');
    result.innerHTML='<div style="text-align:center;padding:24px;color:#a080d8">🤖 AI正在枚举最优组合...</div>';
    const ac=new AbortController();const at=setTimeout(()=>ac.abort(),15000);
    fetch('/api/generate-combos?type=auto&'+ids.map(id=>'ids='+id).join('&'),{signal:ac.signal}).then(r=>{
      clearTimeout(at);
      if(!r.ok) return r.json().then(d=>{throw new Error(d.error||'API error')});
      return r.json();
    }).then(data=>{
      const combos=data.top_combos||[];
      let html='<div class="ar-title">🤖 AI 智能推荐 · '+data.type+'</div>';
      if(combos.length===0){html+='<div class="ar-card" style="text-align:center;color:#8b7fa0;font-size:12px">暂无有效组合</div>'}
      else{
        combos.forEach((c,i)=>{
          html+='<div class="ar-card"><div class="ar-row"><span>🏆 最优组合</span><span class="hit">命中率 '+(c.hit_pct||'—')+'%</span></div>'+
            (c.fair_odds?'<div class="ar-row"><span>公平赔率</span><span class="v">'+c.fair_odds+'x</span></div>':'')+
            '<div class="ar-row"><span>串关类型</span><span class="v">'+data.type+'</span></div>';
          (c.matches||[]).forEach(m=>{
            html+='<div class="ar-row" style="padding:4px 0;font-size:10px"><span>'+(m.home||'')+' vs '+(m.away||'')+'</span><span class="'+(m.prediction==='主胜'?'v':'hit')+'">'+(m.prediction||'')+'</span></div>';
          });
          html+='</div>';
        });
      }
      html+='<div class="ar-actions"><div class="ar-btn primary" onclick="saveResult()">📸 保存截图</div><div class="ar-btn" onclick="shareResult()">🔗 分享</div><div class="ar-btn" onclick="closeAnim()">✕ 关闭</div></div>';
      result.innerHTML=html;
    }).catch(e=>{
      clearTimeout(at);
      const msg=e.name==='AbortError'?'计算超时，请减少场次后重试':e.message;
      result.innerHTML='<div style="text-align:center;padding:24px;color:#8b7fa0;font-size:12px">'+msg+'</div><div class="ar-actions"><div class="ar-btn" onclick="closeAnim()">✕ 关闭</div></div>';
    });
  };
  document.getElementById('animOverlay').onclick=function(e){if(e.target===this){skipAndClose()}};
  document.getElementById('animOverlay').addEventListener('dblclick',function(e){e.stopPropagation();skipAndClose()});

  // P1-9: Search team filter
  const searchInput=document.getElementById('searchInput');
  const searchClear=document.getElementById('searchClear');
  st._searchTerm='';
  searchInput.addEventListener('input',function(){
    st._searchTerm=this.value.trim().toLowerCase();
    searchClear.style.display=st._searchTerm?'block':'none';
    // R2-23: Clear league visual selection when searching
    if(st._searchTerm){
      document.querySelectorAll('#legend .tag').forEach(t=>t.classList.remove('sel'));
    }
    render();
  });
  searchClear.addEventListener('click',function(){
    searchInput.value='';st._searchTerm='';searchClear.style.display='none';
    // R2-23: Restore league selections after clearing search
    document.querySelectorAll('#legend .tag').forEach(t=>{
      const k=t.dataset.k;
      if(k&&st.leagues.has(k))t.classList.add('sel');
    });
    render();
  });
}

let _animTimer=null;
function skipAndClose(){
  clearTimeout(_animTimer);
  closeAnim();
  const n=Math.min(st.picks.size,6);
  if(n>=2){
    const result=document.getElementById('animResult');
    result.classList.add('s');
    showResult(n,result);
    result.style.animation='resultSlide .2s ease forwards';
  }
}
function load(r){
  const ld=document.getElementById('ld'),ml=document.getElementById('ml'),lg=document.getElementById('legend'),bb=document.getElementById('bb');
  ld.classList.add('s');ml.classList.remove('s');ml.innerHTML='';lg.classList.remove('s');
  // Clear stale data immediately
  st.matches=[];st.picks=new Set();
  const lids=[...st.leagues].map(k=>{const found=ALL_LEAGUES.find(l=>l.k===k);return found?found.id:null}).filter(Boolean);
  if(!lids.length){
    ld.classList.remove('s');
    ml.innerHTML='<div style="padding:32px;text-align:center;color:#8b7fa0;font-size:12px">请至少选择一个联赛</div>';ml.classList.add('s');
    return;
  }
  // Cancel previous request if any
  if(st._abort){st._abort.abort()}
  st._abort=new AbortController();
  const signal=st._abort.signal;
  const n=new Date(),t=new Date(n);t.setDate(t.getDate()+r.d);
  const f=d=>d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');

  // P1-6: Request cache (5min TTL)
  if(!st._cache) st._cache={};
  const cacheKey=f(n)+'_'+f(t)+'_'+lids.join(',');
  const cached=st._cache[cacheKey];
  if(cached && (Date.now()-cached.ts < 300000)){
    ld.classList.remove('s');st.matches=cached.data.matches||[];st.picks=new Set();render();
    const activeDate=document.querySelector('.date.sel');
    if(activeDate){const cnt=activeDate.querySelector('.cnt');if(cnt)cnt.textContent=(cached.data.matches?.length||0)+'场'}
    return;
  }

  // Animate loading dots
  let dots=0;const dotInt=setInterval(()=>{dots=(dots+1)%4;ld.textContent='加载中'+'.'.repeat(dots)},400);
  const cleanup=()=>{clearInterval(dotInt);ld.textContent='加载中'};
  fetch('/api/candidates?date_from='+f(n)+'&date_to='+f(t)+'&leagues='+lids.join(','),{signal}).then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.json()}).then(d=>{cleanup();ld.classList.remove('s');st.matches=d.matches||[];st.picks=new Set();
    // Save to cache
    st._cache[cacheKey]={data:d,ts:Date.now()};
    render();
    // Update match count on active date button
    const activeDate=document.querySelector('.date.sel');
    if(activeDate){const cnt=activeDate.querySelector('.cnt');if(cnt)cnt.textContent=(d.matches?.length||0)+'场'}
  }).catch(e=>{cleanup();if(e.name==='AbortError')return;ld.classList.remove('s');ml.innerHTML='<div style="padding:32px;text-align:center;color:#8b7fa0;font-size:12px">加载失败</div>';ml.classList.add('s')});
}
function render(){
  const ml=document.getElementById('ml');ml.innerHTML='';const lg=document.getElementById('legend');const bb=document.getElementById('bb');
  const searchWrap=document.getElementById('searchWrap');
  if(!st.matches.length){searchWrap.style.display='none';ml.innerHTML='<div style="padding:32px;text-align:center;color:#8b7fa0;font-size:12px">暂无推荐比赛<br><span style="font-size:10px;color:#6a5a80;margin-top:6px;display:block">试试其他联赛或日期范围</span></div>';ml.classList.add('s');lg.classList.remove('s');bb.classList.remove('s');return}
  searchWrap.style.display='';ml.classList.add('s');lg.classList.add('s');bb.classList.add('s');

  // Deduplicate BEFORE displayMatches (fix: moved up)
  const seen=new Set();
  st.matches=st.matches.filter(m=>{const key=m.id;if(seen.has(key))return false;seen.add(key);return true});

  // P1-9: Filter matches by search term
  let displayMatches=st.matches;
  if(st._searchTerm){
    displayMatches=st.matches.filter(m=>{
      const h=(m.home_cn||m.home||'').toLowerCase();
      const a=(m.away_cn||m.away||'').toLowerCase();
      return h.includes(st._searchTerm)||a.includes(st._searchTerm);
    });
  }

  // Pagination: show 15 initially
  let _pageSize=15;
  let _shown=0;
  
  function showMore(){
    const items=ml.querySelectorAll('.mc');
    for(let i=_shown;i<_shown+_pageSize&&i<displayMatches.length;i++){
      if(items[i])items[i].style.display='';
    }
    _shown=Math.min(_shown+_pageSize,displayMatches.length);
    const moreBtn=ml.querySelector('.more-btn');
    if(moreBtn){
      if(_shown>=displayMatches.length)moreBtn.style.display='none';
      else moreBtn.textContent='显示更多 ('+(displayMatches.length-_shown)+'场)';
    }
  }
  
  // Deduplicate by fixture_id (keep first occurrence)
  const seen=new Set();
  st.matches=st.matches.filter(m=>{const key=m.id;if(seen.has(key))return false;seen.add(key);return true});
  // Use filtered list for rendering
  if(!st._searchTerm) displayMatches=st.matches;
  
  // Lightning scoring: more bolts = more reliable
  function getLightning(conf){
    if(conf>=90)return '<span style="color:#ffd700">⚡⚡⚡</span>';
    if(conf>=80)return '<span style="color:#ffd700">⚡⚡</span>';
    if(conf>=60)return '<span style="color:#ffd700">⚡</span>';
    return '';
  }
  
  // Check if match is hot (involves popular teams)
  function isHotMatch(m){
    const h=m.home_cn||m.home||'';
    const a=m.away_cn||m.away||'';
    return HOT_TEAMS.has(h)||HOT_TEAMS.has(a);
  }
  
  // Format match time - handle both ISO and date-only formats
  function fmtTime(t){
    if(!t)return '';
    let dStr=t;
    // Handle ISO format: 2026-06-22T17:00:00+00:00 or 2026-06-22T17:00:00Z
    dStr=dStr.replace('T',' ').replace(/\+00:00$/,'').replace(/Z$/,'').replace(/\+08:00$/,'').trim();
    // If only date (no time), show friendly date
    if(dStr.length<=10){
      const parts=dStr.split('-');
      if(parts.length===3)return parseInt(parts[1])+'月'+parseInt(parts[2])+'日';
      return dStr;
    }
    // Parse as local time
    const dt=new Date(dStr+' UTC+8');
    if(isNaN(dt.getTime())){
      // Fallback: try without timezone
      const dt2=new Date(dStr);
      if(isNaN(dt2.getTime()))return dStr.substring(5,10);
      return fmtDateFromDate(dt2);
    }
    return fmtDateFromDate(dt);
  }
  function fmtDateFromDate(dt){
    const now=new Date();
    const diff=Math.round((dt-now)/86400000);
    const h=String(dt.getHours()).padStart(2,'0');
    const m=String(dt.getMinutes()).padStart(2,'0');
    const md=(dt.getMonth()+1)+'月'+dt.getDate()+'日';
    if(diff===0)return '今晚 '+h+':'+m;
    if(diff===1)return '明天 '+h+':'+m;
    if(diff>0&&diff<=7)return md+' '+h+':'+m;
    return md;
  }

  // P2-15: Generate recommendation reason based on xG difference
  function getReasonText(m){
    const hxg=m.home_xg||0,axg=m.away_xg||0;
    const diff=Math.abs(hxg-axg);
    const p=m.prediction;
    if(diff>=1.5)return '实力差距明显';
    if(diff>=1.0)return '进攻优势较大';
    if(diff>=0.5)return '近期状态占优';
    if(p==='平局')return '双方势均力敌';
    return '';
  }

  displayMatches.forEach((m,i)=>{
    const p=m.prediction,ih=p==='主胜',ia=p==='客胜',id=p==='平局';let odds=null;if(m.odds){if(ih)odds=m.odds.home_odds;else if(ia)odds=m.odds.away_odds;else if(id)odds=m.odds.draw_odds}
    const ed=m.odds&&m.odds.edge_pct;
    // P3-16: If flag is a URL, render as lazy-loaded image; otherwise emoji
    const mkFlag=(f)=>f&&f.startsWith('http')?'<img class="mc-t-flag" src="'+f+'" loading="lazy" width="20" height="20" alt="">':'<span class="mc-t-flag">'+(f||'⚽')+'</span>';
    const hF=mkFlag(m.home_flag),aF=mkFlag(m.away_flag),hN=m.home_cn||m.home,aN=m.away_cn||m.away;
    let rc=ia?'mc-rec-away':(id?'mc-rec-draw':'mc-rec-home'),ai='<span class="ai-tag">AI</span>',bd='';
    if(id)bd='<div class="mc-rec '+rc+'">'+ai+' ⚖️ '+p+(odds?' @'+odds:'')+(ed?' +'+ed+'%':'')+'</div>';
    else bd='<div class="mc-rec '+rc+'">'+ai+' 🏆 '+p+(odds?' @'+odds:'')+(ed?' +'+ed+'%':'')+'</div>';
    const row=document.createElement('div');row.className='mc';
    // P2-14: 稳胆 tag for high confidence
    const sureTag=m.confidence>=75?'<span class="sure-tag">🟢稳胆</span>':'';
    if(id)row.innerHTML='<div class="mc-row"><div class="ck" role="checkbox" aria-checked="false" onclick="event.stopPropagation();togCK(this,'+m.id+')"></div><div class="mc-teams"><div class="mc-t">'+hF+'<span class="mc-t-name">'+hN+'</span></div><div class="mc-vs">VS</div><div class="mc-t">'+aF+'<span class="mc-t-name">'+aN+'</span></div></div><div class="mc-info">'+sureTag+'<div class="vl">'+m.confidence+'%</div></div></div><div style="text-align:center;margin-top:4px">'+bd+'</div>';
    else row.innerHTML='<div class="mc-row"><div class="ck" role="checkbox" aria-checked="false" onclick="event.stopPropagation();togCK(this,'+m.id+')"></div><div class="mc-teams"><div class="mc-t">'+hF+'<span class="mc-t-name">'+hN+'</span>'+(ih?bd:'')+'</div><div class="mc-vs">VS</div><div class="mc-t">'+aF+'<span class="mc-t-name">'+aN+'</span>'+(ia?bd:'')+'</div></div><div class="mc-info">'+sureTag+'<div class="vl">'+m.confidence+'%</div></div></div>';
    // Add time display
    const timeEl=row.querySelector('.mc-info');
    if(timeEl)timeEl.innerHTML='<span class="lb">'+(isHotMatch(m)?'🔥 ':'')+fmtTime(m.date)+'</span><div class="vl">'+m.confidence+'<span style="font-size:8px;color:#6a5a80;font-weight:400">%</span>&nbsp;<span style="font-size:10px;letter-spacing:-1px">'+getLightning(m.confidence)+'</span><span class="lb" style="font-size:7px;display:block;margin-top:0">胜率</span></div>';
    // P2-15: One-line recommendation reason
    const reason=getReasonText(m);
    if(reason){const reasonEl=document.createElement('div');reasonEl.className='mc-reason';reasonEl.textContent=reason;row.appendChild(reasonEl)}
    row.addEventListener('click',()=>{const ck=row.querySelector('.ck');togCK(ck,m.id)});
    ml.appendChild(row);
    // Auto-select only high-confidence matches (>60%)
    if(m.confidence > 60){
      st.picks.add(m.id);
      const ck=row.querySelector('.ck');
      ck.classList.add('on');ck.textContent='✓';ck.setAttribute('aria-checked','true');row.classList.add('sel');
    }
  });up();
  
  // Apply pagination
  const allCards=ml.querySelectorAll('.mc');
  allCards.forEach((c,i)=>{if(i>=_pageSize)c.style.display='none'});
  _shown=Math.min(_pageSize,allCards.length);
  if(allCards.length>_pageSize){
    const moreDiv=document.createElement('div');
    moreDiv.className='more-btn';
    moreDiv.style.cssText='text-align:center;padding:12px;font-size:11px;color:#8b7fa0;cursor:pointer;border:1px solid #2a2040;border-radius:8px;margin-top:4px';
    moreDiv.textContent='显示更多 ('+(displayMatches.length-_pageSize)+'场)';
    moreDiv.onclick=showMore;
    ml.appendChild(moreDiv);
  }
}
function up(){
  const actual=st.picks.size;const capped=Math.min(actual,6);
  document.getElementById('sc').textContent=actual;document.getElementById('gb').disabled=actual<2;
  // P1-7: Pulse animation when picks >= 2
  const fbBtn=document.getElementById('gb');
  if(actual>=2)fbBtn.classList.add('ready');else fbBtn.classList.remove('ready');
  const tag=document.getElementById('comboTag');
  const hint=document.getElementById('fbHint');
  if(actual<2){tag.textContent='—';if(hint)hint.textContent='选 2 场以上生成组合'}
  else{const maxT=capped==2?'2串1':capped+'串1';tag.textContent=maxT;if(hint)hint.textContent=actual>6?'已选'+actual+'场·取胜率最高6场组合':'选'+actual+'场·已就绪 ✓'}}

// Global toggle function
function togCK(el,id){
  el.classList.toggle('on');el.textContent=el.classList.contains('on')?'✓':'';
  el.setAttribute('aria-checked',el.classList.contains('on')?'true':'false');
  const card=el.closest('.mc');
  if(el.classList.contains('on')){st.picks.add(id);card.classList.add('sel')}
  else{st.picks.delete(id);card.classList.remove('sel')}
  up();}

// ===== Animation =====
function startAnim(){
  const actual=st.picks.size;
  const n=Math.min(actual,6);
  if(n<2)return;
  const overlay=document.getElementById('animOverlay');
  const balls=document.getElementById('animBalls');
  const ring=document.getElementById('checkRing');
  const result=document.getElementById('animResult');
  
  overlay.classList.add('s');
  balls.innerHTML='';
  ring.style.display='none';
  result.classList.remove('s');
  result.innerHTML='';

  // Create footballs
  for(let i=0;i<n;i++){
    const b=document.createElement('div');
    b.className='anim-ball';
    b.textContent='⚽';
    b.style.animation=`ballIn .4s ease ${i*.12}s forwards`;
    balls.appendChild(b);
  }

  // Add skewer line
  const skewer=document.createElement('div');
  skewer.className='skewer';
  skewer.style.animation='skewerGrow .5s ease '+(n*.12+.2)+'s forwards';
  balls.appendChild(skewer);
  skewer.style.transformOrigin='center';

  // After balls + skewer, do ring check
  const totalDelay=(n*.12+.7)*1000;
  _animTimer=setTimeout(()=>{
    ring.style.display='flex';
    const circ=ring.querySelector('circle');
    const mark=ring.querySelector('.ck-mark');
    circ.style.animation='ringDraw .6s ease forwards';
    setTimeout(()=>{
      mark.style.animation='checkPop .4s ease forwards';
      // Show result
      setTimeout(()=>{
        result.classList.add('s');
        showResult(n,result);
        result.style.animation='resultSlide .4s ease forwards';
      },500);
    },600);
  },totalDelay);
}

function showResult(n,el){
  const parlay=n==2?'2串1':n+'串1';
  // Fetch real combo data from API
  const ids=[...st.picks].map(id=>'ids='+id).join('&');
  el.innerHTML='<div style="text-align:center;padding:24px;color:#8b7fa0">加载组合分析...</div>';
  const ctrl=new AbortController();const timer=setTimeout(()=>ctrl.abort(),15000);
  fetch('/api/generate-combos?type='+n+'&'+ids,{signal:ctrl.signal}).then(r=>{
    clearTimeout(timer);
    if(!r.ok) return r.json().then(d=>{throw new Error(d.error||'API error')}).catch(e=>{if(e.message)throw e;throw new Error('HTTP '+r.status)});
    return r.json();
  }).then(data=>{
    const combos=data.top_combos||[];
    let html='<div class="ar-title">🎯 '+parlay+' 组合分析</div>';
    if(combos.length===0){
      html+='<div class="ar-card" style="text-align:center;color:#8b7fa0;font-size:12px">暂无有效组合</div>';
    } else {
      combos.slice(0,5).forEach((c,i)=>{
        html+='<div class="ar-card"><div class="ar-row"><span>#'+(i+1)+' 组合</span><span class="hit">命中率 '+(c.hit_pct||'—')+'%</span></div>'+
          (c.fair_odds?'<div class="ar-row"><span>公平赔率</span><span class="v">'+c.fair_odds+'x</span></div>':'')+
          '<div class="ar-row"><span>场次</span><span class="v">'+parlay+'</span></div>';
        (c.matches||[]).forEach(m=>{
          html+='<div class="ar-row" style="padding:4px 0;font-size:10px"><span>'+(m.home||'')+' vs '+(m.away||'')+'</span><span class="'+(m.prediction==='主胜'?'v':'hit')+'">'+(m.prediction||'')+'</span></div>';
        });
        html+='</div>';
      });
    }
    html+='<div class="ar-actions"><div class="ar-btn primary" onclick="saveResult()">📸 保存截图</div><div class="ar-btn" onclick="shareResult()">🔗 分享</div><div class="ar-btn" onclick="closeAnim()">✕ 关闭</div></div>';
    el.innerHTML=html;
    // P2-12: Record simulated bet
    if(combos.length>0 && window.recordBet) window.recordBet(parlay, combos);
  }).catch(e=>{
    clearTimeout(timer);
    let msg='网络连接失败',detail='请检查网络后重试';
    if(e.name==='AbortError')                              {msg='计算超时';detail='请减少选择场次后重试';}
    else if(e.message&&e.message.includes('Not enough'))   {msg='选择场次不足';detail='请至少选择'+n+'场比赛';}
    else if(e.message&&e.message.includes('matches'))      {msg='组合过多';detail='请减少选择场次（建议≤10场）';}
    else if(e.message&&e.message.includes('API error'))    {msg='服务异常';detail='服务器繁忙，请稍后重试';}
    el.innerHTML='<div style="text-align:center;padding:24px;color:#8b7fa0;font-size:12px;line-height:1.8">'+msg+'<br><span style="font-size:10px">'+detail+'</span></div><div class="ar-actions"><div class="ar-btn primary" onclick="closeAnim();setTimeout(function(){document.getElementById(\'gb\').click()},300)">🔄 重试</div><div class="ar-btn" onclick="closeAnim()">✕ 关闭</div></div>';
  });
}

function saveResult(){
  const el=document.getElementById('animResult');
  const cards=el.querySelectorAll('.ar-card');
  
  // Calculate canvas height based on content
  const lineH=22;const pad=30;const w=400;
  let lines=2;cards.forEach(c=>{const r=c.querySelectorAll('.ar-row');lines+=r.length+1});
  const h=pad*2+lines*lineH+20;
  
  // Retina support
  const dpr=window.devicePixelRatio||1;
  const canvas=document.createElement('canvas');
  canvas.width=w*dpr;canvas.height=h*dpr;
  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  
  // Background
  ctx.fillStyle='#0d0f14';ctx.fillRect(0,0,w,h);
  ctx.fillStyle='#7c5cbf';ctx.fillRect(0,0,w,3);
  
  ctx.font='bold 14px -apple-system,PingFang SC,Helvetica Neue,sans-serif';
  ctx.fillStyle='#c8b8e8';
  ctx.fillText('⚽ K38 智荐 — '+document.getElementById('comboTag').textContent,pad,pad+15);
  
  ctx.font='12px -apple-system,PingFang SC,Helvetica Neue,sans-serif';
  let y=pad+40;
  cards.forEach(c=>{
    const rows=c.querySelectorAll('.ar-row');
    rows.forEach(r=>{
      const spans=r.querySelectorAll('span');
      let x=pad;
      spans.forEach(s=>{
        const color=window.getComputedStyle(s).color;
        ctx.fillStyle=color||'#8b7fa0';
        const txt=s.textContent.trim();
        ctx.fillText(txt,x,y);
        x+=ctx.measureText(txt+' ').width;
      });
      y+=lineH;
    });
    y+=6;
  });
  
  // Footer
  ctx.fillStyle='#6a5a80';ctx.font='10px -apple-system,Helvetica Neue,sans-serif';
  ctx.fillText('— 由 K38 AI 生成 · tip.k38.ai',pad,y+8);
  
  const link=document.createElement('a');
  link.download='K38-智荐-'+Date.now()+'.png';
  link.href=canvas.toDataURL();
  link.click();
  showToast('✅ 已保存到下载文件夹');
}

function shareResult(){
  const el=document.getElementById('animResult');
  const text='⚽ K38 智荐 AI串关分析\n'+el.textContent.replace(/\s+/g,' ').trim()+'\n— tip.k38.ai';
  if(navigator.share){
    navigator.share({title:'K38 智荐',text:text,url:window.location.href}).catch(()=>{});
  } else {
    navigator.clipboard.writeText(text).then(()=>{
      showToast('✅ 已复制，可粘贴发送');
    });
  }
}

function showToast(msg){
  let t=document.getElementById('toastMsg');
  if(!t){
    t=document.createElement('div');t.id='toastMsg';t.className='toast';
    document.body.appendChild(t);
  }
  t.textContent=msg;
  t.classList.add('s');
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>t.classList.remove('s'),2500);
}

function closeAnim(){
  // Clean up animation elements
  document.getElementById('animBalls').innerHTML='';
  document.getElementById('checkRing').style.display='none';
  document.getElementById('animResult').innerHTML='';
  document.getElementById('animResult').classList.remove('s');
  document.getElementById('animOverlay').classList.remove('s');
}

// P2-12: Simulated bet record (virtual 2 yuan tracking)
(function(){
  const KEY='k38_bets';
  function getBets(){try{return JSON.parse(localStorage.getItem(KEY))||[]}catch(e){return[]}}
  function saveBets(bets){localStorage.setItem(KEY,JSON.stringify(bets.slice(-50)))}

  // Record a bet when result is generated
  window.recordBet=function(type,combos){
    const bets=getBets();
    bets.push({
      id:Date.now(),
      ts:new Date().toISOString(),
      type:type,
      matches:combos.slice(0,6).map(m=>({home:m.home,away:m.away,prediction:m.prediction})),
      hit_pct:combos[0]&&combos[0].hit_pct||0,
      stake:2,
      status:'pending' // pending | won | lost
    });
    saveBets(bets);
  };

  // Show stats overlay
  document.getElementById('statsLink').onclick=function(){
    const bets=getBets();
    const overlay=document.getElementById('statsOverlay');
    const result=document.getElementById('statsResult');
    overlay.style.display='flex';
    const won=bets.filter(b=>b.status==='won').length;
    const lost=bets.filter(b=>b.status==='lost').length;
    const pending=bets.filter(b=>b.status==='pending').length;
    const total=bets.length;
    const totalStake=total*2;
    const winRate=total>0?Math.round(won/Math.max(won+lost,1)*100):0;
    let html='<div class="ar-title">📊 模拟投注战绩</div>';
    html+='<div class="ar-card"><div class="ar-row"><span>总投注</span><span class="v">'+total+'注 · ¥'+totalStake+'</span></div>';
    html+='<div class="ar-row"><span>胜/负/待定</span><span class="v"><span style="color:#4caf50">'+won+'胜</span> / <span style="color:#f44336">'+lost+'负</span> / '+pending+'待</span></div>';
    html+='<div class="ar-row"><span>命中率</span><span class="hit">'+winRate+'%</span></div></div>';
    if(bets.length===0){
      html+='<div class="ar-card" style="text-align:center;color:#8b7fa0;font-size:11px;padding:20px">还没有投注记录<br>生成串关后自动记录</div>';
    } else {
      html+='<div style="max-height:200px;overflow-y:auto">';
      bets.slice(-10).reverse().forEach(b=>{
        const statusIcon=b.status==='won'?'✅':b.status==='lost'?'❌':'⏳';
        const teams=b.matches.map(m=>m.home+' vs '+m.away).join(', ');
        html+='<div class="ar-card" style="padding:8px 10px"><div class="ar-row"><span style="font-size:10px">'+statusIcon+' '+b.type+'</span><span style="font-size:9px;color:#6a5a80">'+b.ts.slice(5,16).replace('T',' ')+'</span></div><div style="font-size:9px;color:#8b7fa0;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+teams+'</div></div>';
      });
      html+='</div>';
    }
    html+='<div class="ar-actions"><div class="ar-btn" onclick="document.getElementById(\'statsOverlay\').style.display=\'none\'">✕ 关闭</div><div class="ar-btn" onclick="if(confirm(\'清空所有记录？\')){localStorage.removeItem(\'k38_bets\');document.getElementById(\'statsOverlay\').style.display=\'none\'}">🗑 清空</div></div>';
    result.innerHTML=html;
  };
  // Tap overlay to close
  document.getElementById('statsOverlay').onclick=function(e){if(e.target===this)this.style.display='none'};
})();

// P1-10: Theme toggle
(function(){
  const toggle=document.getElementById('themeToggle');
  const saved=localStorage.getItem('k38_theme')||'dark';
  document.body.setAttribute('data-theme',saved);
  toggle.textContent=saved==='light'?'☀️':'🌙';
  toggle.addEventListener('click',function(){
    const current=document.body.getAttribute('data-theme')||'dark';
    const next=current==='dark'?'light':'dark';
    document.body.setAttribute('data-theme',next);
    toggle.textContent=next==='light'?'☀️':'🌙';
    localStorage.setItem('k38_theme',next);
  });
})();

init();
