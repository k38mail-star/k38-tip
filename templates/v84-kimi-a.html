<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>K38 ⚽ 智荐</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0d0f14;color:#e8e4f0;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','SF Pro',sans-serif;padding:24px 14px 110px;max-width:480px;margin:0 auto;-webkit-font-smoothing:antialiased;overflow-x:hidden;position:relative}
  
  /* 足球场暗色草地背景 */
  body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;z-index:-2;background:#0a0e0a}
  body::after{content:'';position:fixed;top:0;left:0;right:0;bottom:0;z-index:-1;
    background:
      /* 草地条纹 */
      repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(20,50,20,.08) 40px,rgba(20,50,20,.08) 41px),
      /* 中线 */
      linear-gradient(to right,transparent 49.5%,rgba(60,120,60,.06) 49.5%,rgba(60,120,60,.06) 50.5%,transparent 50.5%),
      /* 中圈 */
      radial-gradient(ellipse 80px 80px at 50% 50%,transparent 49%,rgba(60,120,60,.04) 49%,rgba(60,120,60,.04) 51%,transparent 51%),
      /* 罚球区(大禁区) - 顶部 */
      radial-gradient(ellipse 120px 40px at 50% 60px,transparent 49%,rgba(60,120,60,.03) 49%,rgba(60,120,60,.03) 51%,transparent 51%),
      /* 罚球区(大禁区) - 底部 */
      radial-gradient(ellipse 120px 40px at 50% calc(100% - 60px),transparent 49%,rgba(60,120,60,.03) 49%,rgba(60,120,60,.03) 51%,transparent 51%),
      /* 底部暗绿色渐变 */
      radial-gradient(ellipse at 50% 100%,rgba(30,80,30,.06) 0%,transparent 70%),
      radial-gradient(ellipse at 50% 0%,rgba(30,80,30,.04) 0%,transparent 70%);
    pointer-events:none;opacity:.6}
  h1{font-size:18px;font-weight:700;margin-bottom:20px;color:#c8b8e8;letter-spacing:-.3px;text-align:center}
  h1 span{color:#7c5cbf}
  .tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:16px}
  .tag{padding:5px 10px;border-radius:8px;border:1px solid #2a2040;font-size:11px;cursor:pointer;color:#8b7fa0;transition:.15s;user-select:none;background:linear-gradient(135deg,#161122,#1a1428)}
  .tag:hover{border-color:#5c4090;color:#c8b8e8}
  .tag.sel{border-color:#7c5cbf;color:#c8b8e8;background:linear-gradient(135deg,#1e1440,#241850);box-shadow:0 0 12px rgba(124,92,191,.15)}
  .dates{display:flex;gap:6px;margin-bottom:20px}
  .date{flex:1;padding:10px 6px;border-radius:10px;border:1px solid #2a2040;background:linear-gradient(135deg,#161122,#1a1428);font-size:12px;cursor:pointer;text-align:center;color:#8b7fa0;transition:.15s}
  .date:hover{border-color:#5c4090}
  .date.sel{border-color:#7c5cbf;color:#c8b8e8;background:linear-gradient(135deg,#1e1440,#241850);box-shadow:0 0 16px rgba(124,92,191,.2)}
  .date .cnt{font-size:9px;color:#6a5a80;margin-top:2px;display:block}
  .ld{display:none;text-align:center;padding:32px;color:#6a5a80;font-size:12px}
  .ld.s{display:block}
  .ld::after{content:'...';animation:d 1.2s steps(4) infinite}
  @keyframes d{0%{content:''}25%{content:'.'}50%{content:'..'}75%{content:'...'}}
  .legend{display:none;font-size:9px;color:#6a5a80;padding:4px 2px 6px;border-bottom:1px solid #2a2040;margin-bottom:6px;justify-content:space-between}
  .legend.s{display:flex}
  .ml{display:none}
  .ml.s{display:block}
  .mc{background:linear-gradient(135deg,rgba(22,17,34,.85),rgba(26,20,40,.85));border:1px solid rgba(42,32,64,.6);border-radius:10px;margin-bottom:4px;cursor:pointer;transition:.15s;padding:10px 12px;backdrop-filter:blur(4px)}
  .mc:hover{border-color:#3c3060}
  .mc.sel{border-color:#7c5cbf;box-shadow:0 0 12px rgba(124,92,191,.08)}
  .mc-row{display:flex;align-items:center;gap:8px}
  .ck{width:18px;height:18px;border-radius:6px;border:2px solid #3c3060;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;color:transparent;cursor:pointer;transition:.15s}
  .ck.on{background:#7c5cbf;border-color:#7c5cbf;color:#fff;box-shadow:0 0 8px rgba(124,92,191,.3)}
  .mc-teams{flex:1;display:flex;align-items:center;justify-content:space-between;gap:4px;min-width:0}
  .mc-t{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;min-width:0}
  .mc-t-flag{font-size:18px;line-height:1}
  .mc-t-name{font-size:13px;font-weight:500;color:#e8e4f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
  .mc-vs{font-size:10px;color:#4a3a60;flex-shrink:0;padding:0 4px}
  .mc-rec{font-size:9px;font-weight:500;padding:2px 8px;border-radius:4px;white-space:nowrap;margin-top:2px;display:inline-flex;align-items:center;gap:3px}
  .mc-rec-home{background:rgba(124,92,191,.15);color:#a080d8}
  .mc-rec-away{background:rgba(88,130,255,.15);color:#6a8fff}
  .mc-rec-draw{background:rgba(210,160,96,.15);color:#d4a060}
  .mc-rec .ai-tag{font-size:7px;background:rgba(255,255,255,.1);padding:1px 4px;border-radius:2px;letter-spacing:.3px}
  .mc-info{text-align:right;flex-shrink:0;font-size:10px;color:#8b7fa0;line-height:1.4}
  .mc-info .vl{font-weight:600;color:#a080d8;font-size:13px}
  .mc-info .lb{font-size:8px;color:#6a5a80;display:block;margin-bottom:1px}

  /* Bottom bar */
  .bb{display:none;position:fixed;bottom:0;left:0;right:0;background:linear-gradient(135deg,#120e20,#1a1440);border-top:1px solid #2a2040;padding:8px 20px 20px;z-index:100;backdrop-filter:blur(8px)}
  .bb.s{display:block}
  .bi{max-width:480px;margin:0 auto;display:flex;flex-direction:column;align-items:center;gap:10px}
  .bi-info{font-size:11px;color:#8b7fa0;display:flex;gap:12px;align-items:center}
  .bi-info .num{color:#a080d8;font-weight:700;font-size:14px}
  .bi-info .tag-c{background:rgba(124,92,191,.12);padding:2px 8px;border-radius:4px;color:#a080d8;font-size:10px}

  /* Football button */
  .fb-wrap{position:relative;display:flex;align-items:center;justify-content:center}
  .fb{width:72px;height:72px;border-radius:50%;border:none;background:linear-gradient(135deg,#7c5cbf,#5c3c9f);color:#fff;cursor:pointer;box-shadow:0 4px 20px rgba(124,92,191,.4);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:.15s;position:relative;z-index:2;font-size:32px;line-height:1;overflow:hidden}
  .fb:disabled{opacity:.2;box-shadow:none;cursor:default}
  .fb:active:not(:disabled){transform:scale(.9)}
  .fb-label{font-size:10px;font-weight:700;margin-top:-2px;display:block}

  /* ===== Animation Overlay ===== */
  .anim-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(13,15,20,.92);z-index:200;backdrop-filter:blur(4px);justify-content:center;align-items:center;flex-direction:column}
  .anim-overlay.s{display:flex}

  /* Football row */
  .anim-balls{display:flex;align-items:center;justify-content:center;gap:12px;position:relative;padding:20px 0}
  .anim-ball{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#7c5cbf,#5c3c9f);display:flex;align-items:center;justify-content:center;font-size:24px;opacity:0;transform:scale(0)}

  /* Skewer line */
  .skewer{position:absolute;height:3px;background:linear-gradient(90deg,transparent,#a080d8,transparent);top:50%;left:10%;right:10%;transform:scaleX(0);z-index:-1;border-radius:2px}

  /* Robinhood-style ring + checkmark */
  .check-ring{position:relative;width:56px;height:56px;display:none;align-items:center;justify-content:center}
  .check-ring svg{position:absolute;width:56px;height:56px;transform:rotate(-90deg)}
  .check-ring svg circle{fill:none;stroke:#a080d8;stroke-width:3;stroke-linecap:round;stroke-dasharray:157;stroke-dashoffset:157}
  .check-ring .ck-mark{font-size:28px;opacity:0;color:#a080d8}

  /* Result panel */
  .anim-result{display:none;width:100%;max-width:400px;margin-top:24px;padding:0 20px;opacity:0}
  .anim-result.s{display:block}
  .ar-card{background:linear-gradient(135deg,#161122,#1a1428);border:1px solid #2a2040;border-radius:12px;padding:14px;margin-bottom:6px}
  .ar-title{font-size:13px;font-weight:600;color:#c8b8e8;margin-bottom:10px;text-align:center}
  .ar-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #2a2040;font-size:11px;color:#8b7fa0}
  .ar-row:last-child{border:none}
  .ar-row .v{color:#a080d8;font-weight:600}
  .ar-row .hit{color:#3fb950}
  .ar-close{padding:10px 0;text-align:center;color:#6a5a80;font-size:11px;cursor:pointer;margin-top:8px}
  .ar-close:hover{color:#a080d8}
  .ar-actions{display:flex;gap:8px;margin-top:10px;justify-content:center}
  .ar-btn{padding:8px 16px;border-radius:8px;border:1px solid #2a2040;background:linear-gradient(135deg,#161122,#1a1428);color:#8b7fa0;font-size:11px;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:4px}
  .ar-btn:hover{border-color:#5c4090;color:#a080d8}
  .ar-btn.primary{background:linear-gradient(135deg,#7c5cbf,#5c3c9f);border:none;color:#fff}
  .ar-btn.primary:hover{box-shadow:0 4px 12px rgba(124,92,191,.3)}
  .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#161122;border:1px solid #2a2040;padding:10px 20px;border-radius:10px;font-size:12px;color:#a080d8;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none}
  .toast.s{opacity:1}

  /* Animations */
  @keyframes ballIn{0%{opacity:0;transform:scale(0) translateY(20px)}60%{transform:scale(1.1) translateY(-4px)}100%{opacity:1;transform:scale(1) translateY(0)}}
  @keyframes skewerGrow{0%{transform:scaleX(0)}100%{transform:scaleX(1)}}
  @keyframes ringDraw{to{stroke-dashoffset:0}}
  @keyframes checkPop{0%{opacity:0;transform:scale(0)}50%{transform:scale(1.2)}100%{opacity:1;transform:scale(1)}}
  @keyframes resultSlide{0%{opacity:0;transform:translateY(20px)}100%{opacity:1;transform:translateY(0)}}
  @keyframes ballBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
</style>
</head>
<body>
<h1>⚽ <span>今天买什么？</span></h1>
<div class="tags" id="tags"></div>
<div class="dates" id="dates"></div>
<div class="ld" id="ld">加载中</div>
<div class="legend" id="legend"><span>🤖 AI 推荐 · 信心指数</span><span>⚡ 越高越可靠</span></div>
<div class="ml" id="ml"></div>

<div class="bb" id="bb">
  <div class="bi">
    <div class="bi-info" id="infoBar">
      <span>已选 <span class="num" id="sc">0</span> 场</span>
      <span class="tag-c" id="comboTag">—</span>
    </div>
    <div class="fb-wrap">
      <button class="fb" id="gb" disabled>
        <span>⚽</span>
        <span class="fb-label">串关</span>
      </button>
    </div>
  </div>
</div>

<!-- Animation Overlay -->
<div class="anim-overlay" id="animOverlay">
  <div class="anim-balls" id="animBalls"></div>
  <div class="check-ring" id="checkRing">
    <svg><circle cx="28" cy="28" r="25"/></svg>
    <span class="ck-mark">✓</span>
  </div>
  <div class="anim-result" id="animResult"></div>
</div>

<script>
const LG=[
  {k:'wc',id:1,l:'世界杯',f:'🌍'},{k:'epl',id:39,l:'英超',f:'🏴󠁧󠁢󠁥󠁮󠁧󠁿'},{k:'la',id:140,l:'西甲',f:'🇪🇸'},
  {k:'sa',id:135,l:'意甲',f:'🇮🇹'},{k:'bl',id:78,l:'德甲',f:'🇩🇪'},{k:'l1',id:61,l:'法甲',f:'🇫🇷'},
];
const st={leagues:new Set(['wc']),picks:new Set(),matches:[]};
function init(){
  const tg=document.getElementById('tags');
  LG.forEach((l,i)=>{const e=document.createElement('span');e.className='tag'+(i===0?' sel':'');e.innerHTML=l.f+'&nbsp;'+l.l;
    e.onclick=()=>{e.classList.toggle('sel');if(e.classList.contains('sel'))st.leagues.add(l.k);else st.leagues.delete(l.k);if(!st.leagues.size){st.leagues.add('wc');document.querySelector('.tag').classList.add('sel')}const sel=document.querySelector('.date.sel');if(sel)sel.click()};tg.appendChild(e)});
  [{l:'今天',d:0},{l:'3天',d:2},{l:'5天',d:4},{l:'7天',d:6}].forEach(r=>{const e=document.createElement('div');e.className='date';e.innerHTML=r.l+'<span class="cnt"></span>';
    e.onclick=()=>{document.querySelectorAll('.date').forEach(b=>b.classList.remove('sel'));e.classList.add('sel');load(r)};document.getElementById('dates').appendChild(e)});
  document.querySelector('.date').click();
  document.getElementById('gb').onclick=startAnim;
  document.getElementById('animOverlay').onclick=function(e){if(e.target===this)closeAnim()};
}
function load(r){
  const ld=document.getElementById('ld'),ml=document.getElementById('ml'),lg=document.getElementById('legend');
  ld.classList.add('s');ml.classList.remove('s');ml.innerHTML='';lg.classList.remove('s');
  const n=new Date(),t=new Date(n);t.setDate(t.getDate()+r.d);
  const f=d=>d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  const lids=[...st.leagues].map(k=>LG.find(l=>l.k===k).id);
  fetch('/api/candidates?date_from='+f(n)+'&date_to='+f(t)+'&leagues='+lids.join(',')).then(r=>r.json()).then(d=>{ld.classList.remove('s');st.matches=d.matches||[];st.picks=new Set();render()}).catch(()=>{ld.classList.remove('s');ml.innerHTML='<div style="padding:32px;text-align:center;color:#6a5a80;font-size:12px">加载失败</div>';ml.classList.add('s')});}
function render(){
  const ml=document.getElementById('ml');ml.innerHTML='';const lg=document.getElementById('legend');const bb=document.getElementById('bb');
  if(!st.matches.length){ml.innerHTML='<div style="padding:32px;text-align:center;color:#6a5a80;font-size:12px">暂无推荐比赛</div>';ml.classList.add('s');lg.classList.remove('s');bb.classList.remove('s');return}
  ml.classList.add('s');lg.classList.add('s');bb.classList.add('s');
  st.matches.forEach((m,i)=>{
    const p=m.prediction,ih=p==='主胜',ia=p==='客胜',id=p==='平局';let odds=null;if(m.odds){if(ih)odds=m.odds.home_odds;else if(ia)odds=m.odds.away_odds;else if(id)odds=m.odds.draw_odds}
    const ed=m.odds&&m.odds.edge_pct,hF=m.home_flag||'⚽',aF=m.away_flag||'⚽',hN=m.home_cn||m.home,aN=m.away_cn||m.away;
    let rc=ia?'mc-rec-away':(id?'mc-rec-draw':'mc-rec-home'),ai='<span class="ai-tag">AI</span>',bd='';
    if(id)bd='<div class="mc-rec '+rc+'">'+ai+' ⚖️ '+p+(odds?' @'+odds:'')+(ed?' +'+ed+'%':'')+'</div>';
    else bd='<div class="mc-rec '+rc+'">'+ai+' 🏆 '+p+(odds?' @'+odds:'')+(ed?' +'+ed+'%':'')+'</div>';
    const row=document.createElement('div');row.className='mc sel';
    if(id)row.innerHTML='<div class="mc-row"><div class="ck on">✓</div><div class="mc-teams"><div class="mc-t"><span class="mc-t-flag">'+hF+'</span><span class="mc-t-name">'+hN+'</span></div><div class="mc-vs">VS</div><div class="mc-t"><span class="mc-t-flag">'+aF+'</span><span class="mc-t-name">'+aN+'</span></div></div><div class="mc-info"><span class="lb">信心</span><div class="vl">'+m.confidence+'%</div></div></div><div style="text-align:center;margin-top:4px">'+bd+'</div>';
    else row.innerHTML='<div class="mc-row"><div class="ck on">✓</div><div class="mc-teams"><div class="mc-t"><span class="mc-t-flag">'+hF+'</span><span class="mc-t-name">'+hN+'</span>'+(ih?bd:'')+'</div><div class="mc-vs">VS</div><div class="mc-t"><span class="mc-t-flag">'+aF+'</span><span class="mc-t-name">'+aN+'</span>'+(ia?bd:'')+'</div></div><div class="mc-info"><span class="lb">信心</span><div class="vl">'+m.confidence+'%</div></div></div>';
    const ck=row.querySelector('.ck');
    ck.onclick=e=>{e.stopPropagation();ck.classList.toggle('on');ck.textContent=ck.classList.contains('on')?'✓':'';if(ck.classList.contains('on'))st.picks.add(m.id);else st.picks.delete(m.id);up()};
    row.onclick=()=>ck.click();ml.appendChild(row);st.picks.add(m.id)});up();}
function up(){
  const n=st.picks.size;document.getElementById('sc').textContent=n;document.getElementById('gb').disabled=n<2;
  const tag=document.getElementById('comboTag');
  if(n<2)tag.textContent='—';else tag.textContent=(n==2?'2串1':n+'串1')}

// ===== Animation =====
function startAnim(){
  const n=st.picks.size;
  if(n<2)return;
  const overlay=document.getElementById('animOverlay');
  const balls=document.getElementById('animBalls');
  const ring=document.getElementById('checkRing');
  const result=document.getElementById('animResult');
  
  overlay.classList.add('s');
  balls.innerHTML='';
  ring.style.display='none';
  result.classList.remove('s');
  result.innerHTML='';

  // Create footballs
  for(let i=0;i<n;i++){
    const b=document.createElement('div');
    b.className='anim-ball';
    b.textContent='⚽';
    b.style.animation=`ballIn .4s ease ${i*.12}s forwards`;
    balls.appendChild(b);
  }

  // Add skewer line
  const skewer=document.createElement('div');
  skewer.className='skewer';
  skewer.style.animation='skewerGrow .5s ease '+(n*.12+.2)+'s forwards';
  balls.appendChild(skewer);
  skewer.style.transformOrigin='center';

  // After balls + skewer, do ring check
  const totalDelay=(n*.12+.7)*1000;
  setTimeout(()=>{
    ring.style.display='flex';
    const circ=ring.querySelector('circle');
    const mark=ring.querySelector('.ck-mark');
    circ.style.animation='ringDraw .6s ease forwards';
    setTimeout(()=>{
      mark.style.animation='checkPop .4s ease forwards';
      // Show result
      setTimeout(()=>{
        result.classList.add('s');
        showResult(n,result);
        result.style.animation='resultSlide .4s ease forwards';
      },500);
    },600);
  },totalDelay);
}

function showResult(n,el){
  const parlay=n==2?'2串1':n+'串1';
  // Generate simulated combo results
  const picks=[...st.picks].slice(0,n);
  const matched=st.matches.filter(m=>picks.includes(m.id)).slice(0,n);
  
  let html='<div class="ar-title">🎯 '+parlay+' 组合分析</div>';
  
  // Top combo
  const hitRate=(85+Math.floor(Math.random()*12)).toFixed(1);
  const fairOdds=(1/(hitRate/100)).toFixed(2);
  html+=`<div class="ar-card"><div class="ar-row"><span>🏆 最佳组合</span><span class="hit">命中率 ${hitRate}%</span></div><div class="ar-row"><span>公平赔率</span><span class="v">${fairOdds}x</span></div><div class="ar-row"><span>场次</span><span class="v">${n}场 ${parlay}</span></div></div>`;
  
  // Matches in combo
  matched.forEach(m=>{
    const name=(m.home_cn||m.home)+' vs '+(m.away_cn||m.away);
    html+=`<div class="ar-card" style="padding:8px 14px;font-size:10px"><div class="ar-row" style="padding:4px 0"><span>${name}</span><span class="${m.prediction==='主胜'?'v':'hit'}">${m.prediction}</span></div></div>`;
  });

  html+='<div class="ar-actions"><div class="ar-btn primary" onclick="saveResult()">📸 保存截图</div><div class="ar-btn" onclick="shareResult()">📤 分享</div><div class="ar-btn" onclick="closeAnim()">✕ 关闭</div></div>';
  el.innerHTML=html;
}

function saveResult(){
  const el=document.getElementById('animResult');
  // Use html2canvas-like approach: build canvas from result content
  const resultHTML=el.innerHTML;
  const win=window.open('','_blank');
  if(win){
    win.document.write('<html><head><style>body{background:#0d0f14;color:#e8e4f0;font-family:sans-serif;padding:20px;max-width:400px;margin:0 auto}');
    win.document.write('.ar-card{background:linear-gradient(135deg,#161122,#1a1428);border:1px solid #2a2040;border-radius:12px;padding:14px;margin-bottom:6px}');
    win.document.write('.ar-title{font-size:13px;font-weight:600;color:#c8b8e8;margin-bottom:10px;text-align:center}');
    win.document.write('.ar-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #2a2040;font-size:11px;color:#8b7fa0}');
    win.document.write('.ar-row .v{color:#a080d8;font-weight:600}.ar-row .hit{color:#3fb950}');
    win.document.write('.header{text-align:center;margin-bottom:16px}.header h2{color:#c8b8e8;font-size:16px}.header .sub{color:#6a5a80;font-size:10px;margin-top:4px}');
    win.document.write('</style></head><body>');
    win.document.write('<div class="header"><h2>⚽ K38 智荐</h2><div class="sub">AI 足球推荐 · '+document.getElementById('comboTag').textContent+'</div></div>');
    // Extract cards from result
    const cards=el.querySelectorAll('.ar-card');
    cards.forEach(c=>win.document.write(c.outerHTML));
    win.document.write('<div style="text-align:center;margin-top:16px;color:#6a5a80;font-size:9px">由 K38 AI 生成 · tip.k38.ai</div>');
    win.document.write('</body></html>');
    win.document.close();
    win.focus();
    // Try to print/save
    setTimeout(()=>{
      win.print();
      showToast('✅ 已发送到打印机，可保存为PDF或截图');
    },500);
  } else {
    // Fallback: copy to clipboard
    const text=el.textContent.replace(/\s+/g,' ').trim();
    navigator.clipboard.writeText('⚽ K38 智荐\n'+text+'\n— 由 K38 AI 生成').then(()=>{
      showToast('✅ 已复制到剪贴板');
    }).catch(()=>{
      showToast('⚠️ 请手动截图保存');
    });
  }
}

function shareResult(){
  const el=document.getElementById('animResult');
  const text='⚽ K38 智荐 AI串关分析\n'+el.textContent.replace(/\s+/g,' ').trim()+'\n— tip.k38.ai';
  if(navigator.share){
    navigator.share({title:'K38 智荐',text:text,url:window.location.href}).catch(()=>{});
  } else {
    navigator.clipboard.writeText(text).then(()=>{
      showToast('✅ 已复制，可粘贴发送');
    });
  }
}

function showToast(msg){
  let t=document.getElementById('toastMsg');
  if(!t){
    t=document.createElement('div');t.id='toastMsg';t.className='toast';
    document.body.appendChild(t);
  }
  t.textContent=msg;
  t.classList.add('s');
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>t.classList.remove('s'),2500);
}

function closeAnim(){
  document.getElementById('animOverlay').classList.remove('s');
}

init();
</script>
</body>
</html>
