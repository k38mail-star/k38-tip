<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K38 ⚽ 智荐</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:#0d1117;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif;color:#e6edf3;-webkit-font-smoothing:antialiased}
  .app{max-width:560px;margin:0 auto;padding:32px 16px 80px;min-height:100vh}
  h1{font-size:24px;font-weight:700;text-align:center;letter-spacing:-.02em;margin-bottom:4px}
  .sub{text-align:center;font-size:12px;color:#8b949e;margin-bottom:24px}

  /* Steps */
  .step{margin-bottom:16px}
  .step-label{font-size:11px;color:#8b949e;margin-bottom:8px;display:flex;align-items:center;gap:4px}
  .step-label .num{display:inline-flex;width:18px;height:18px;border-radius:50%;border:1px solid #484f58;align-items:center;justify-content:center;font-size:9px;color:#484f58;flex-shrink:0}
  .step-label.active{color:#e6edf3}.step-label.active .num{border-color:#3fb950;color:#3fb950;background:rgba(35,134,54,.08)}
  .step-label.done .num{border-color:#58a6ff;color:#58a6ff;background:rgba(88,166,255,.08)}

  /* League chips */
  .lg-grid{display:flex;gap:4px;flex-wrap:wrap}
  .lg-item{padding:6px 12px;border-radius:6px;border:1px solid #21262d;background:transparent;color:#8b949e;font-size:12px;cursor:pointer;transition:.1s;user-select:none}
  .lg-item:hover{border-color:#30363d;color:#e6edf3}
  .lg-item.sel{border-color:#238636;background:rgba(35,134,54,.08);color:#3fb950}

  /* Date cards */
  .dp-grid{display:flex;gap:6px}
  .dp-btn{flex:1;padding:14px 8px;border-radius:8px;border:1px solid #30363d;background:#161b22;color:#e6edf3;font-size:14px;cursor:pointer;text-align:center;transition:.1s;font-weight:500}
  .dp-btn:hover{border-color:#58a6ff}
  .dp-btn.sel{border-color:#238636;background:rgba(35,134,54,.08);color:#3fb950}
  .dp-btn .cnt{display:block;font-size:10px;color:#484f58;margin-top:2px;font-weight:400}
  .dp-btn.sel .cnt{color:#3fb950}

  /* Loading */
  .loading{display:none;text-align:center;padding:48px 20px;color:#484f58}
  .loading.show{display:block}
  .spin{display:inline-block;width:20px;height:20px;border:2px solid #21262d;border-top-color:#58a6ff;border-radius:50%;animation:s .6s linear infinite}
  @keyframes s{to{transform:rotate(360deg)}}

  /* Card results (v83 style) */
  .cards{display:none;flex-direction:column;gap:16px;margin-top:8px}
  .cards.show{display:flex}
  .card{background:#161b22;border:1px solid #21262d;border-radius:16px;overflow:hidden;transition:border-color .2s,box-shadow .2s}
  .card:hover{border-color:#30363d;box-shadow:0 8px 24px rgba(0,0,0,.4)}
  .card.selected{border-color:#d9a05b;box-shadow:0 0 0 1px rgba(217,160,91,.35),0 8px 24px rgba(0,0,0,.4)}
  .rec-banner{display:flex;align-items:center;padding:10px 14px 10px 10px;font-size:12px;font-weight:500;gap:10px;min-height:40px;user-select:none}
  .rec-banner--home-win{background:linear-gradient(135deg,#1b3a1f 0%,#16331a 100%);border-bottom:1px solid #2d6a30}
  .rec-banner--away-win{background:linear-gradient(135deg,#1a2a4a 0%,#152542 100%);border-bottom:1px solid #2a4a7a}
  .rec-check{flex-shrink:0;width:20px;height:20px;border-radius:6px;border:1.5px solid #484f58;background:#0d1117;cursor:pointer;transition:all .15s;-webkit-appearance:none;appearance:none;position:relative}
  .rec-check:checked{background:#d9a05b;border-color:#d9a05b}
  .rec-check:checked::after{content:'';width:6px;height:10px;border:solid #0d1117;border-width:0 2px 2px 0;transform:rotate(45deg) translateY(-1px);position:absolute;top:2px}
  .rec-label-area{flex:1;display:flex;align-items:center;gap:8px;min-width:0}
  .rec-text{font-size:13px;font-weight:600;color:#e6edf3;white-space:nowrap}
  .rec-text .bet-type{color:#f0e6d3}
  .rec-odds{font-size:12px;font-weight:500;color:#8b949e;margin-left:4px}
  .rec-edge{font-size:11px;font-weight:700;color:#d9a05b;background:rgba(217,160,91,.12);padding:1px 8px;border-radius:10px;white-space:nowrap}
  .rec-confidence{flex-shrink:0;display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;letter-spacing:.3px;padding:3px 10px 3px 8px;border-radius:20px;white-space:nowrap}
  .rec-confidence--high{color:#58a6ff;background:rgba(88,166,255,.12);border:1px solid rgba(88,166,255,.25)}
  .rec-confidence--mid{color:#d9a05b;background:rgba(217,160,91,.12);border:1px solid rgba(217,160,91,.25)}
  .rec-confidence--low{color:#8b949e;background:rgba(139,148,158,.08);border:1px solid rgba(139,148,158,.18)}
  .conf-dot{width:6px;height:6px;border-radius:50%;display:inline-block}
  .rec-confidence--high .conf-dot{background:#58a6ff}
  .rec-confidence--mid .conf-dot{background:#d9a05b}
  .rec-confidence--low .conf-dot{background:#8b949e}
  .match-body{padding:16px 14px 14px}
  .teams-row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:14px}
  .team{flex:1;display:flex;align-items:center;gap:10px;font-size:15px;font-weight:600;color:#c9d1d9;min-width:0}
  .team--home{justify-content:flex-start}
  .team--away{justify-content:flex-end;flex-direction:row-reverse}
  .team-crest{width:28px;height:28px;border-radius:50%;background:#21262d;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
  .team-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
  .team--highlighted-home .team-name{color:#3fb950;font-weight:700}
  .team--highlighted-away .team-name{color:#58a6ff;font-weight:700}
  .team--highlighted-home .team-crest{background:rgba(63,185,80,.12);border:1px solid rgba(63,185,80,.3)}
  .team--highlighted-away .team-crest{background:rgba(88,166,255,.12);border:1px solid rgba(88,166,255,.3)}
  .vs-divider{font-size:12px;font-weight:600;color:#484f58;flex-shrink:0;padding:0 4px}
  .match-info{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:#6e7681;padding-top:12px;border-top:1px solid #21262d}
  .match-info-left{display:flex;align-items:center;gap:10px;min-width:0}
  .match-league{font-weight:500;color:#8b949e}
  .match-league-icon{width:14px;height:14px;border-radius:3px;background:#21262d;display:inline-flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0}
  .match-time{color:#6e7681}
  .match-stats{display:flex;align-items:center;gap:8px;flex-shrink:0}
  .stat-tag{font-size:11px;font-weight:500;color:#8b949e;background:#0d1117;padding:2px 8px;border-radius:8px;border:1px solid #21262d;display:flex;align-items:center;gap:4px}
  .stat-tag .stat-label{color:#6e7681}
  .stat-tag .stat-value{color:#d9a05b;font-weight:600}

  /* Empty state */
  .empty{display:none;text-align:center;padding:64px 20px;color:#484f58}
  .empty.show{display:block}.empty .icon{font-size:32px;margin-bottom:12px}

  /* Bottom bar */
  .bb{position:fixed;bottom:0;left:0;right:0;background:#161b22;border-top:1px solid #21262d;padding:10px 16px;display:none;z-index:100}
  .bb.show{display:block}.bb-inner{max-width:560px;margin:0 auto;display:flex;align-items:center;gap:10px}
  .bb-info{flex:1}.bb-cnt{font-size:13px;font-weight:600}.bb-cnt span{color:#3fb950}
  .bb-odds{font-size:10px;color:#8b949e;margin-top:1px}
  .bb-btn{padding:10px 20px;border-radius:8px;border:none;background:#238636;color:#fff;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
  .bb-btn:disabled{opacity:.3;cursor:default}
  @media(max-width:480px){.team{font-size:14px;gap:8px}.team-crest{width:24px;height:24px;font-size:13px}}
</style>
</head>
<body>
<div class="app">
  <h1>今天买什么？</h1>
  <div class="sub">AI 足球推荐 · 智能串关</div>

  <!-- Step 1: League -->
  <div class="step">
    <div class="step-label active" id="sl1"><span class="num">1</span> 想看哪些联赛？</div>
    <div class="lg-grid" id="leagueGrid"></div>
  </div>

  <!-- Step 2: Date -->
  <div class="step">
    <div class="step-label" id="sl2"><span class="num">2</span> 想看哪几天？</div>
    <div class="dp-grid" id="dateGrid"></div>
  </div>

  <!-- Loading -->
  <div class="loading" id="loading"><div class="spin"></div></div>

  <!-- Results -->
  <div class="cards" id="cards"></div>
  <div class="empty" id="empty"><div class="icon">📭</div><div>暂无推荐比赛</div></div>
</div>

<!-- Bottom bar -->
<div class="bb" id="bb">
  <div class="bb-inner">
    <div class="bb-info"><div class="bb-cnt">已选 <span id="selCnt">0</span> 场</div><div class="bb-odds" id="selOdds"></div></div>
    <button class="bb-btn" id="goBtn" disabled>🎯 AI串关</button>
  </div>
</div>

<script>
const LEAGUE_MAP = {
  'epl': {id:39, name:'英超', flag:'🏴󠁧󠁢󠁥󠁮󠁧󠁿'},
  'la':  {id:140, name:'西甲', flag:'🇪🇸'},
  'sa':  {id:135, name:'意甲', flag:'🇮🇹'},
  'bl':  {id:78,  name:'德甲', flag:'🇩🇪'},
  'l1':  {id:61,  name:'法甲', flag:'🇫🇷'},
  'wc':  {id:1,   name:'世界杯', flag:'🌍'},
};

let state = { leagues: new Set(), dateRange: null, matches: [], selected: new Set() };

function init() {
  // Render league chips
  const grid = document.getElementById('leagueGrid');
  for (const [key, l] of Object.entries(LEAGUE_MAP)) {
    const el = document.createElement('span');
    el.className = 'lg-item';
    el.textContent = l.flag + ' ' + l.name;
    el.dataset.key = key;
    el.onclick = () => toggleLeague(key);
    grid.appendChild(el);
  }
  // "全部" button
  const allEl = document.createElement('span');
  allEl.className = 'lg-item sel';
  allEl.textContent = '✓ 全部';
  allEl.dataset.key = 'all';
  allEl.onclick = () => toggleLeague('all');
  grid.appendChild(allEl);

  // Select all by default
  for (const key of Object.keys(LEAGUE_MAP)) state.leagues.add(key);

  // Render date buttons
  const dg = document.getElementById('dateGrid');
  const ranges = [
    {label:'今天', days:0, key:'today'},
    {label:'3天', days:2, key:'d3'},
    {label:'5天', days:4, key:'d5'},
    {label:'7天', days:6, key:'d7'},
  ];
  ranges.forEach(r => {
    const el = document.createElement('button');
    el.className = 'dp-btn';
    el.innerHTML = r.label + ' <span class="cnt">-</span>';
    el.dataset.key = r.key;
    el.dataset.days = r.days;
    el.onclick = () => pickDate(el, r);
    dg.appendChild(el);
  });
}

function toggleLeague(key) {
  const allEl = document.querySelector('.lg-item:last-child');
  if (key === 'all') {
    document.querySelectorAll('.lg-item').forEach(e => e.classList.remove('sel'));
    allEl.classList.add('sel');
    allEl.textContent = '✓ 全部';
    state.leagues = new Set(Object.keys(LEAGUE_MAP));
  } else {
    allEl.classList.remove('sel');
    allEl.textContent = '全部';
    const el = document.querySelector(`.lg-item[data-key="${key}"]`);
    el.classList.toggle('sel');
    if (el.classList.contains('sel')) state.leagues.add(key);
    else state.leagues.delete(key);
    if (state.leagues.size === Object.keys(LEAGUE_MAP).length) {
      allEl.classList.add('sel');
      allEl.textContent = '✓ 全部';
    } else if (state.leagues.size === 0) {
      // Re-select all
      state.leagues = new Set(Object.keys(LEAGUE_MAP));
      document.querySelectorAll('.lg-item').forEach(e => e.classList.add('sel'));
      allEl.classList.add('sel');
      allEl.textContent = '✓ 全部';
    }
  }
  // Enable step 2
  document.getElementById('sl1').classList.add('done');
  document.getElementById('sl2').classList.add('active');
}

function pickDate(el, range) {
  document.querySelectorAll('.dp-btn').forEach(b => b.classList.remove('sel'));
  el.classList.add('sel');
  state.dateRange = range;

  // Load matches
  loadMatches();
}

function loadMatches() {
  const loading = document.getElementById('loading');
  const cards = document.getElementById('cards');
  const empty = document.getElementById('empty');
  loading.classList.add('show');
  cards.classList.remove('show');
  empty.classList.remove('show');

  // Calculate date range
  const now = new Date();
  const dateTo = new Date(now);
  dateTo.setDate(dateTo.getDate() + parseInt(state.dateRange.days));
  const fmt = d => d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');

  // Build league IDs
  const leagueIds = [...state.leagues].map(k => LEAGUE_MAP[k].id);

  // Fetch via API
  fetch('/api/candidates?date_from='+fmt(now)+'&date_to='+fmt(dateTo)+'&leagues='+leagueIds.join(','))
    .then(r => r.json())
    .then(data => {
      loading.classList.remove('show');
      renderCards(data.matches || []);
    })
    .catch(err => {
      loading.classList.remove('show');
      empty.classList.add('show');
      empty.innerHTML = '<div class="icon">⚠️</div><div>加载失败，请重试</div>';
    });
}

function renderCards(matches) {
  const cards = document.getElementById('cards');
  const empty = document.getElementById('empty');
  const bb = document.getElementById('bb');

  cards.innerHTML = '';
  state.matches = matches;
  state.selected = new Set();

  if (!matches || matches.length === 0) {
    empty.classList.add('show');
    cards.classList.remove('show');
    bb.classList.remove('show');
    return;
  }

  empty.classList.remove('show');
  cards.classList.add('show');
  bb.classList.add('show');

  matches.forEach((m, i) => {
    const isHome = m.prediction === '主胜';
    const bannerClass = isHome ? 'rec-banner--home-win' : 'rec-banner--away-win';
    const conf = m.confidence;
    const confLevel = conf >= 75 ? 'high' : (conf >= 55 ? 'mid' : 'low');
    const confLabel = conf >= 75 ? '高置信度' : (conf >= 55 ? '中等置信度' : '低置信度');
    const oddsVal = m.odds ? (isHome ? m.odds.home_odds : m.odds.away_odds) : null;
    const teamName = m.home_cn || m.home;
    const awayName = m.away_cn || m.away;
    const displayXg = isHome ? m.home_xg : m.away_xg;

    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.id = m.id;
    card.innerHTML = `
      <div class="rec-banner ${bannerClass}">
        <input type="checkbox" class="rec-check" id="chk${i}">
        <div class="rec-label-area">
          <span class="rec-icon">🏆</span>
          <span class="rec-text">推荐 <span class="bet-type">${m.prediction}</span>
            ${oddsVal ? '<span class="rec-odds">@'+oddsVal+'</span>' : ''}
          </span>
          ${m.odds && m.odds.edge_pct ? '<span class="rec-edge">+'+m.odds.edge_pct+'% Edge</span>' : ''}
        </div>
        <div class="rec-confidence rec-confidence--${confLevel}">
          <span class="conf-dot"></span>${confLabel}
        </div>
      </div>
      <div class="match-body">
        <div class="teams-row">
          <div class="team team--home${isHome ? ' team--highlighted-home' : ''}">
            <div class="team-crest">${m.home_flag || '⚽'}</div>
            <span class="team-name">${teamName}</span>
          </div>
          <div class="vs-divider">VS</div>
          <div class="team team--away${!isHome ? ' team--highlighted-away' : ''}">
            <div class="team-crest">${m.away_flag || '⚽'}</div>
            <span class="team-name">${awayName}</span>
          </div>
        </div>
        <div class="match-info">
          <div class="match-info-left">
            <span class="match-league"><span class="match-league-icon">${m.home_flag || '🏆'}</span>${m.league}</span>
            <span class="match-time">${m.match_time}</span>
          </div>
          <div class="match-stats">
            ${displayXg ? '<span class="stat-tag"><span class="stat-label">xG</span><span class="stat-value">'+displayXg+'</span></span>' : ''}
            <span class="stat-tag"><span class="stat-label">信心</span><span class="stat-value">${conf}%</span></span>
          </div>
        </div>
      </div>
    `;

    // Checkbox handler
    const check = card.querySelector('.rec-check');
    check.addEventListener('change', () => {
      card.classList.toggle('selected', check.checked);
      if (check.checked) state.selected.add(m.id);
      else state.selected.delete(m.id);
      updateBottomBar();
    });

    cards.appendChild(card);
  });

  updateBottomBar();
}

function updateBottomBar() {
  const n = state.selected.size;
  document.getElementById('selCnt').textContent = n;
  document.getElementById('goBtn').disabled = n < 2;
}

init();
</script>
</body>
</html>
