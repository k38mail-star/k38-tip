<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>K38 ⚽ V5 · X</title><style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'SF Pro','-apple-system',BlinkMacSystemFont,sans-serif;background:#000;color:#e7e9ea;-webkit-font-smoothing:antialiased}
.container{max-width:600px;margin:0 auto;padding:12px}
.header{display:flex;justify-content:space-between;align-items:center;padding:12px 0;margin-bottom:8px}
.logo{font-size:18px;font-weight:700;color:#e7e9ea;letter-spacing:-.03em}
.logo small{font-size:10px;color:#71767b;font-weight:400;margin-left:2px}
.header-date{font-size:12px;color:#71767b}
.picker{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:12px}
.picker-btn{width:34px;height:34px;border-radius:9999px;border:none;background:transparent;color:#71767b;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.picker-btn:hover{background:rgba(255,255,255,.04)}
.picker-center{text-align:center}
.picker-label{font-size:15px;font-weight:600;color:#e7e9ea}
.picker-sub{font-size:12px;color:#71767b;margin-top:1px}
.picker-today{font-size:12px;color:#1d9bf0;background:none;border:none;padding:6px 14px;border-radius:9999px;cursor:pointer;font-weight:500}
.picker-today:hover{background:rgba(29,155,240,.08)}
.actions{display:flex;gap:4px;margin-bottom:12px}
.btn{flex:1;padding:10px 0;border-radius:9999px;border:none;font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:.15s}
.btn:disabled{opacity:.3;cursor:default}
.btn-primary{background:#1d9bf0;color:#fff}
.btn-primary:hover:not(:disabled){background:#1a8cd8}
.btn-ghost{background:transparent;border:1px solid rgba(255,255,255,.12);color:#e7e9ea}
.btn-ghost:hover:not(:disabled){background:rgba(255,255,255,.04)}
.msg{display:none;padding:10px 14px;font-size:12px;margin-bottom:12px;text-align:center}
.msg.show{display:block}
.msg-error{background:rgba(255,69,58,.1);color:#ff453a;border-radius:9999px}
.msg-info{background:rgba(29,155,240,.1);color:#1d9bf0;border-radius:9999px}
.candidates{display:none;margin-bottom:12px}
.candidates.show{display:block}
.ch{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;padding:0 4px}
.ch-left{font-size:12px;color:#71767b;font-weight:500}
.ch-right{font-size:12px;color:#71767b;cursor:pointer}
.ch-right input{accent-color:#1d9bf0;margin-right:3px}
.cand-row{display:flex;align-items:center;gap:8px;padding:10px 12px;font-size:13px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.06);transition:.1s}
.cand-row:hover{background:rgba(255,255,255,.02)}
.cand-row.selected{background:rgba(29,155,240,.04)}
.cand-time{color:#71767b;font-size:12px;min-width:55px}
.cand-teams{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tags{display:flex;gap:4px;align-items:center}
.tag{padding:1px 6px;border-radius:9999px;font-size:11px;font-weight:500}
.tag-win{background:rgba(0,184,122,.1);color:#00b87a}
.tag-ou{background:rgba(255,149,0,.1);color:#ff9f0a}
.tag-bt{background:rgba(175,82,222,.1);color:#bf5af2}
.tag-conf{background:rgba(29,155,240,.1);color:#1d9bf0}
.results{display:none}
.results.show{display:block}
.rh{font-size:12px;color:#71767b;margin-bottom:8px;padding:0 4px}
.combo{padding:12px;border-bottom:1px solid rgba(255,255,255,.06)}
.ct{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.cr{font-weight:700;font-size:14px;color:#1d9bf0}
.cm{display:flex;gap:10px;font-size:12px}
.chit{color:#00b87a}
.codds{color:#ff9f0a}
.legs{display:grid;gap:4px}
.leg{display:flex;align-items:center;gap:4px;padding:3px 0;font-size:12px;color:#71767b}
.leg-t{flex:1}
.lp{display:flex;gap:4px}
.empty{padding:48px;text-align:center;color:#71767b;font-size:13px}
.spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,.06);border-top-color:#1d9bf0;border-radius:50%;animation:s .6s linear infinite;display:inline-block;vertical-align:middle}
@keyframes s{to{transform:rotate(360deg)}}
</style></head>
<body><div class="container">
  <div class="header"><div class="logo">K38<small> ⚽</small></div><div class="header-date" id="d"></div></div>
  <div class="picker"><button class="picker-btn" onclick="sd(-1)">‹</button><div class="picker-center"><div class="picker-label" id="l">今日</div><div class="picker-sub" id="s">6月21日</div></div><button class="picker-btn" onclick="sd(1)">›</button><button class="picker-today" onclick="rt()">今天</button></div>
  <div class="actions"><button class="btn btn-primary" id="lb" onclick="lc()">📊 加载</button><button class="btn btn-ghost" id="g3" onclick="gn(3)" disabled>3串1</button><button class="btn btn-ghost" id="g4" onclick="gn(4)" disabled>4串1</button></div>
  <div class="msg" id="m"></div>
  <div class="candidates" id="cs"><div class="ch"><span class="ch-left">候选 <span id="cc">0</span></span><label class="ch-right"><input type="checkbox" id="sa" checked onchange="ta()"> 全选</label></div><div id="cl"></div></div>
  <div class="results" id="rs"><div class="rh" id="rh"></div><div id="rl"></div></div>
</div>
<script>
let cd=new Date(),cl=[],df='',dt='',wd=['日','一','二','三','四','五','六'],fm=d=>d.toISOString().split('T')[0],fc=d=>(d.getMonth()+1)+'月'+d.getDate()+'日';
function ud(){const t=new Date(),n=Math.round((cd-t)/864e5);document.getElementById('l').textContent=n===0?'今日':n===1?'明日':n===-1?'昨日':n>0?n+'天后':Math.abs(n)+'天前';document.getElementById('s').textContent=fc(cd);document.getElementById('d').textContent=fc(cd);df=fm(cd);dt=fm(cd)}ud()
function sd(n){cd.setDate(cd.getDate()+n);ud();if(cl.length)lc()}
function rt(){cd=new Date();ud();if(cl.length)lc()}
function ms(t,x){const e=document.getElementById('m');e.className='msg show msg-'+t;e.textContent=x;if(t==='info')setTimeout(()=>e.classList.remove('show'),4e3)}
async function lc(){const b=document.getElementById('lb');b.disabled=1;b.innerHTML='<span class="spinner"></span>';document.getElementById('cs').classList.remove('show');document.getElementById('rs').classList.remove('show');try{const r=await fetch('/api/candidates?date_from='+df+'&date_to='+dt),d=await r.json();if(d.error)throw Error(d.error);cl=d.matches||[];rc(cl);document.getElementById('cs').classList.add('show');if(!cl.length)ms('info','该日期没有可推荐的比赛');else if(cl.length<3){eg();ms('info','只有 '+cl.length+' 场，选3场生成3串1')}else eg()}catch(e){ms('error','加载失败: '+e.message)}finally{b.disabled=0;b.innerHTML='📊 加载'}}
function rc(l){document.getElementById('cc').textContent=l.length;document.getElementById('sa').checked=1;if(!l.length){document.getElementById('cl').innerHTML='<div class="empty">暂无比赛</div>';return}
document.getElementById('cl').innerHTML=l.map(m=>{const t=(m.match_time||m.date||'').length>10?(m.match_time||'').slice(5,16):(m.date||'').slice(5),ou=m.over_2_5>.55?'大2.5':m.over_2_5<.45&&m.over_2_5>0?'小2.5':'';return '<div class="cand-row selected" data-id="'+m.id+'" onclick="this.classList.toggle(\'selected\');eg()"><span class="cand-time">'+t+'</span><span class="cand-teams">'+(m.home_cn||m.home)+' vs '+(m.away_cn||m.away)+'</span><div class="tags"><span class="tag tag-win">'+m.prediction+'</span>'+(ou?'<span class="tag tag-ou">'+ou+'</span>':'')+(m.btts>.55?'<span class="tag tag-bt">⚽⚽</span>':'')+'<span class="tag tag-conf">'+m.confidence+'%</span></div></div>'}).join('');eg()}
function ta(){document.querySelectorAll('.cand-row').forEach(r=>r.classList.toggle('selected',document.getElementById('sa').checked));eg()}
function si(){return Array.from(document.querySelectorAll('.cand-row.selected')).map(r=>r.dataset.id)}
function eg(){const n=si().length;document.getElementById('g3').disabled=n<3;document.getElementById('g4').disabled=n<4}
async function gn(t){const ids=si();if(ids.length<t){ms('info','需要至少 '+t+' 场');return}let c=1;for(let i=0;i<t;i++)c=c*(ids.length-i)/(i+1);if(c>500&&!confirm('生成 '+Math.round(c)+' 种组合，继续？'))return;const b=document.getElementById('g'+t);b.disabled=1;b.innerHTML='<span class="spinner"></span>';document.getElementById('rs').classList.remove('show');ms('info','计算 '+Math.round(c)+' 种组合...');try{const r=await fetch('/api/generate-combos?type='+t+'&'+ids.map(i=>'ids='+i).join('&')),d=await r.json();if(d.error)throw Error(d.error);rr(d,t);document.getElementById('rs').classList.add('show');ms('info','')}catch(e){ms('error','生成失败: '+e.message)}finally{b.disabled=0;b.innerHTML=t+'串1';eg()}}
function rr(d,t){document.getElementById('rh').textContent=t+'串1 · 共'+d.total_combos+'种 · 候选'+d.candidate_matches+'场';const c=d.top_combos||[];if(!c.length){document.getElementById('rl').innerHTML='<div class="empty">暂无可用组合</div>';return}
document.getElementById('rl').innerHTML=c.map((o,i)=>'<div class="combo"><div class="ct"><span class="cr">#'+(i+1)+'</span><div class="cm"><span class="chit">'+o.hit_pct+'%</span>'+(o.fair_odds?'<span class="codds">'+o.fair_odds+'</span>':'')+'</div></div><div class="legs">'+o.matches.map(m=>'<div class="leg"><span class="leg-t">'+(m.home_cn||m.home)+' vs '+(m.away_cn||m.away)+'</span><div class="lp"><span class="tag tag-win">'+m.prediction+'</span><span class="tag tag-conf">'+m.confidence+'%</span></div></div>').join('')+'</div></div>').join('')}
</script></body></html>
