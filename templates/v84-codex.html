<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>K38 вљҢ</title>
<style>
body{background:#0d1117;color:#e6edf3;font-family:-apple-system,BlinkMacSystemFont,sans-serif;margin:0;padding:16px;max-width:480px;margin:0 auto}
h1{font-size:16px;font-weight:600;margin:0 0 12px;letter-spacing:-.3px}
.lb{display:flex;gap:4px;overflow-x:auto;padding:0 0 8px;scrollbar-width:none;margin-bottom:4px}
.lb::-webkit-scrollbar{display:none}
.lc{flex-shrink:0;padding:3px 8px;border-radius:4px;border:1px solid #21262d;font-size:10px;cursor:pointer;color:#8b949e;white-space:nowrap}
.lc.sel{border-color:#238636;color:#3fb950;background:rgba(35,134,54,.06)}
.dr{display:flex;gap:4px;margin-bottom:12px}
.db{flex:1;padding:6px 0;border-radius:4px;border:1px solid #21262d;background:#161b22;font-size:10px;cursor:pointer;text-align:center;color:#8b949e}
.db.sel{border-color:#238636;color:#3fb950;background:rgba(35,134,54,.06)}
.db .n{font-size:11px;font-weight:500;color:#e6edf3;display:block}
.db.sel .n{color:#3fb950}
.ml{}
/* cards taller + AI tag */
.mr{background:#161b22;border:1px solid #21262d;border-radius:8px;margin-bottom:4px;cursor:pointer;padding:10px 12px}
.mr:hover{border-color:#30363d}
.mr-row{display:flex;align-items:center;gap:8px}
.ck{width:18px;height:18px;border-radius:4px;border:1.5px solid #30363d;flex-shrink:0;font-size:9px;display:flex;align-items:center;justify-content:center;color:transparent}
.ck.on{border-color:#238636;background:#238636;color:#fff}
.mt{flex:1;display:flex;align-items:center;justify-content:space-between;gap:6px;min-width:0}
.mc{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;min-width:0}
.mf{font-size:18px;line-height:1}
.mn{font-size:12px;font-weight:500;color:#c9d1d9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.vs{font-size:10px;color:#484f58;flex-shrink:0;padding:0 6px}
.rec{font-size:9px;font-weight:500;padding:2px 8px;border-radius:4px;white-space:nowrap;margin-top:3px;display:inline-flex;align-items:center;gap:3px}
.rec-h{background:rgba(35,134,54,.12);color:#3fb950}
.rec-a{background:rgba(88,166,255,.12);color:#58a6ff}
.rec-d{background:rgba(210,153,34,.12);color:#d29922}
.rec .ai{font-size:7px;background:rgba(255,255,255,.08);padding:1px 4px;border-radius:2px;letter-spacing:.3px}
.ri{text-align:right;flex-shrink:0;font-size:10px;color:#8b949e;line-height:1.4}
.ri .vl{font-weight:600;color:#e6edf3;font-size:14px}
.ri .lb{font-size:8px;color:#636366;display:block;margin-bottom:1px}
.bb{display:none;position:fixed;bottom:0;left:0;right:0;background:#161b22;border-top:1px solid #21262d;padding:6px 14px;z-index:100}
.bb.s{display:block}
.bi{max-width:480px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.bc{font-size:11px;color:#8b949e}
.bc span{color:#3fb950;font-weight:600}
.bbtn{padding:6px 14px;border-radius:4px;border:none;background:#238636;color:#fff;font-size:11px;font-weight:600;cursor:pointer}
.bbtn:disabled{opacity:.3;cursor:default}
</style>
</head>
<body>
<h1>вљҢ д»Ље¤©д№°д»Ђд№€</h1>
<div class="lb" id="lb"></div>
<div class="dr" id="dr"></div>
<div class="ml" id="ml"></div>
<div class="bb" id="bb"><div class="bi"><div class="bc">е·ІйЂ‰ <span id="sc">0</span></div><button class="bbtn" id="gb" disabled>дёІе…і</button></div></div>

<script>
const LG=[
  {k:'wc',id:1,l:'дё–з•ЊжқҮ',f:'рџЊҚ'},
  {k:'epl',id:39,l:'и‹±и¶…',f:'рџЏөу Ѓ§у Ѓұу ЃӨу Ѓ®у Ѓ§у Ѓү'},
  {k:'la',id:140,l:'иӨүз”І',f:'рџ‡Ғрџ‡ё'},
  {k:'sa',id:135,l:'ж„Џз”І',f:'рџ‡®рџ‡№'},
  {k:'bl',id:78,l:'ең·з”І',f:'рџ‡©рџ‡Ғ'},
  {k:'l1',id:61,l:'жі•з”І',f:'рџ‡«рџ‡·'},
];
let st={leagues:new Set(['wc']),picks:new Set(),matches:[]};
function init(){
  const lb=document.getElementById('lb');
  LG.forEach((l,i)=>{
    const e=document.createElement('span');
    e.className='lc'+(i===0?' sel':'');
    e.textContent=l.f+l.l;
    e.onclick=()=>{e.classList.toggle('sel');if(e.classList.contains('sel'))st.leagues.add(l.k);else st.leagues.delete(l.k);if(!st.leagues.size){st.leagues.add('wc');document.querySelector('.lc').classList.add('sel')};const sel=document.querySelector('.db.sel');if(sel)sel.click()};
    lb.appendChild(e);
  });
  const dr=document.getElementById('dr');
  [{l:'д»Ље¤©',d:0},{l:'3е¤©',d:2},{l:'5е¤©',d:4},{l:'7е¤©',d:6}].forEach(r=>{
    const e=document.createElement('div');
    e.className='db';
    e.innerHTML='<span class="n">'+r.l+'</span>';
    e.onclick=()=>{document.querySelectorAll('.db').forEach(b=>b.classList.remove('sel'));e.classList.add('sel');load(r)};
    dr.appendChild(e);
  });
  document.querySelector('.db').click();
}
function load(r){
  const ml=document.getElementById('ml');
  const now=new Date();const to=new Date(now);to.setDate(to.getDate()+r.d);
  const f=d=>d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  const lids=[...st.leagues].map(k=>LG.find(l=>l.k===k).id);
  ml.innerHTML='<div style="text-align:center;padding:24px;color:#30363d;font-size:10px">еЉ иҢҢдё­...</div>';
  fetch('/api/candidates?date_from='+f(now)+'&date_to='+f(to)+'&leagues='+lids.join(',')).then(r=>r.json()).then(d=>{
    st.matches=d.matches||[];st.picks=new Set();render();
  }).catch(()=>{ml.innerHTML='<div style="text-align:center;padding:24px;color:#30363d;font-size:10px">е¤±иөӨ</div>'});
}
function render(){
  const ml=document.getElementById('ml');ml.innerHTML='';
  const bb=document.getElementById('bb');
  if(!st.matches.length){ml.innerHTML='<div style="text-align:center;padding:24px;color:#30363d;font-size:10px">жљ‚ж— </div>';bb.classList.remove('s');return}
  bb.classList.add('s');
  st.matches.forEach((m,i)=>{
    const p=m.prediction;const ih=p==='дё»иѓњ';const ia=p==='е®ұиѓњ';const id=p==='е№іе±Ђ';
    let odds=null;if(m.odds){if(ih)odds=m.odds.home_odds;else if(ia)odds=m.odds.away_odds;else if(id)odds=m.odds.draw_odds}
    const ed=m.odds&&m.odds.edge_pct;
    const hF=m.home_flag||'вљҢ';const aF=m.away_flag||'вљҢ';
    const hN=m.home_cn||m.home;const aN=m.away_cn||m.away;
    let rc=ia?'rec-a':(id?'rec-d':'rec-h');
    let ai='<span class="ai">AI</span>';
    let bd='';
    if(id){
      bd='<div class="rec '+rc+'" style="margin:3px auto 0">'+ai+' вљ–пёЏ '+p+(odds?' @'+odds:'')+(ed?' +'+ed+'%':'')+'</div>';
    } else {
      bd='<div class="rec '+rc+'">'+ai+' рџЏ† '+p+(odds?' @'+odds:'')+(ed?' +'+ed+'%':'')+'</div>';
    }
    const row=document.createElement('div');row.className='mr';
    if(id){
      row.innerHTML='<div class="mr-row"><div class="ck on">вњ“</div><div class="mt"><div class="mc"><span class="mf">'+hF+'</span><span class="mn">'+hN+'</span></div><div class="vs">VS</div><div class="mc"><span class="mf">'+aF+'</span><span class="mn">'+aN+'</span></div></div><div class="ri"><span class="lb">дүҰеүѓ</span><div class="vl">'+m.confidence+'%</div></div></div>'+bd;
    } else {
      row.innerHTML='<div class="mr-row"><div class="ck on">вњ“</div><div class="mt"><div class="mc"><span class="mf">'+hF+'</span><span class="mn">'+hN+'</span>'+(ih?bd:'')+'</div><div class="vs">VS</div><div class="mc"><span class="mf">'+aF+'</span><span class="mn">'+aN+'</span>'+(ia?bd:'')+'</div></div><div class="ri"><span class="lb">дүҰеүѓ</span><div class="vl">'+m.confidence+'%</div></div></div>';
    }
    const ck=row.querySelector('.ck');
    ck.onclick=e=>{e.stopPropagation();ck.classList.toggle('on');ck.textContent=ck.classList.contains('on')?'вњ“':'';if(ck.classList.contains('on'))st.picks.add(m.id);else st.picks.delete(m.id);up()};
    row.onclick=()=>ck.click();
    ml.appendChild(row);
    st.picks.add(m.id);
  });
  up();
}
function up(){const n=st.picks.size;document.getElementById('sc').textContent=n;document.getElementById('gb').disabled=n<2}
init();
</script>
</body>
</html>
