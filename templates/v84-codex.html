<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>K38 ⚽</title>
<style>
body{background:#0d1117;color:#e6edf3;font-family:-apple-system,BlinkMacSystemFont,sans-serif;margin:0;padding:16px;max-width:480px;margin:0 auto}
h1{font-size:16px;font-weight:600;margin:0 0 12px;letter-spacing:-.3px}

/* league bar - horizontal scroll */
.lb{display:flex;gap:4px;overflow-x:auto;padding:0 0 8px;scrollbar-width:none;margin-bottom:4px}
.lb::-webkit-scrollbar{display:none}
.lc{flex-shrink:0;padding:3px 8px;border-radius:4px;border:1px solid #21262d;font-size:10px;cursor:pointer;color:#8b949e;white-space:nowrap}
.lc.sel{border-color:#238636;color:#3fb950;background:rgba(35,134,54,.06)}

/* date row */
.dr{display:flex;gap:4px;margin-bottom:12px}
.db{flex:1;padding:6px 0;border-radius:4px;border:1px solid #21262d;background:#161b22;font-size:10px;cursor:pointer;text-align:center;color:#8b949e}
.db.sel{border-color:#238636;color:#3fb950;background:rgba(35,134,54,.06)}
.db .n{font-size:11px;font-weight:500;color:#e6edf3;display:block}
.db.sel .n{color:#3fb950}

/* matches - single line rows */
.ml{}
.mr{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid #161b22;cursor:pointer}
.mr:last-child{border:none}
.ck{width:14px;height:14px;border-radius:3px;border:1.5px solid #30363d;flex-shrink:0;font-size:7px;display:flex;align-items:center;justify-content:center;color:transparent}
.ck.on{border-color:#238636;background:#238636;color:#fff}
.tm{flex:1;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tm .fl{font-size:10px}
.ri{text-align:right;flex-shrink:0;font-size:10px;color:#8b949e;line-height:1.3}
.ri .p{font-weight:600;color:#3fb950}
.ri .pb{color:#58a6ff}
.ri .c{color:#8b949e}

/* bottom bar */
.bb{display:none;position:fixed;bottom:0;left:0;right:0;background:#161b22;border-top:1px solid #21262d;padding:6px 14px;z-index:100}
.bb.s{display:block}
.bi{max-width:480px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.bc{font-size:11px;color:#8b949e}
.bc span{color:#3fb950;font-weight:600}
.bbtn{padding:6px 14px;border-radius:4px;border:none;background:#238636;color:#fff;font-size:11px;font-weight:600;cursor:pointer}
.bbtn:disabled{opacity:.3;cursor:default}
</style>
</head>
<body>
<h1>⚽ 今天买什么</h1>
<div class="lb" id="lb"></div>
<div class="dr" id="dr"></div>
<div class="ml" id="ml"></div>
<div class="bb" id="bb"><div class="bi"><div class="bc">已选 <span id="sc">0</span></div><button class="bbtn" id="gb" disabled>串关</button></div></div>

<script>
const LG=[
  {k:'epl',id:39,l:'英超',f:'🏴󠁧󠁢󠁥󠁮󠁧󠁿'},
  {k:'la',id:140,l:'西甲',f:'🇪🇸'},
  {k:'sa',id:135,l:'意甲',f:'🇮🇹'},
  {k:'bl',id:78,l:'德甲',f:'🇩🇪'},
  {k:'l1',id:61,l:'法甲',f:'🇫🇷'},
  {k:'wc',id:1,l:'世界杯',f:'🌍'},
];
let st={leagues:new Set(LG.map(l=>l.k)),picks:new Set(),matches:[]};

function init(){
  const lb=document.getElementById('lb');
  LG.forEach(l=>{
    const e=document.createElement('span');
    e.className='lc sel';e.textContent=l.f+l.l;
    e.onclick=()=>{e.classList.toggle('sel');if(e.classList.contains('sel'))st.leagues.add(l.k);else st.leagues.delete(l.k);if(!st.leagues.size){st.leagues.add(l.k);e.classList.add('sel')}};
    lb.appendChild(e);
  });

  const dr=document.getElementById('dr');
  [{l:'今天',d:0},{l:'3天',d:2},{l:'5天',d:4},{l:'7天',d:6}].forEach(r=>{
    const e=document.createElement('div');
    e.className='db';
    e.innerHTML='<span class="n">'+r.l+'</span>';
    e.onclick=()=>{document.querySelectorAll('.db').forEach(b=>b.classList.remove('sel'));e.classList.add('sel');load(r)};
    dr.appendChild(e);
  });
  document.querySelector('.db').click();
}

function load(r){
  const ml=document.getElementById('ml');
  const now=new Date();const to=new Date(now);to.setDate(to.getDate()+r.d);
  const f=d=>d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  const lids=[...st.leagues].map(k=>LG.find(l=>l.k===k).id);

  ml.innerHTML='<div style="text-align:center;padding:24px;color:#30363d;font-size:10px">加载中...</div>';
  fetch('/api/candidates?date_from='+f(now)+'&date_to='+f(to)+'&leagues='+lids.join(',')).then(r=>r.json()).then(d=>{
    st.matches=d.matches||[];st.picks=new Set();render();
  }).catch(()=>{ml.innerHTML='<div style="text-align:center;padding:24px;color:#30363d;font-size:10px">失败</div>'});
}

function render(){
  const ml=document.getElementById('ml');ml.innerHTML='';
  const bb=document.getElementById('bb');
  if(!st.matches.length){ml.innerHTML='<div style="text-align:center;padding:24px;color:#30363d;font-size:10px">暂无</div>';bb.classList.remove('s');return}
  bb.classList.add('s');
  st.matches.forEach((m,i)=>{
    const ih=m.prediction==='主胜';
    const odds=m.odds?(ih?m.odds.home_odds:m.odds.away_odds):null;
    const row=document.createElement('div');row.className='mr';
    row.innerHTML='<div class="ck on">✓</div><div class="tm"><span class="fl">'+(m.home_flag||'')+'</span> '+(m.home_cn||m.home)+' vs '+(m.away_cn||m.away)+'</div><div class="ri"><div class="'+(ih?'p':'pb')+'">'+m.prediction+(odds?' @'+odds:'')+'</div><div class="c">'+m.confidence+'% · '+m.league.slice(-4)+'</div></div>';
    const ck=row.querySelector('.ck');
    ck.onclick=e=>{e.stopPropagation();ck.classList.toggle('on');ck.textContent=ck.classList.contains('on')?'✓':'';if(ck.classList.contains('on'))st.picks.add(m.id);else st.picks.delete(m.id);up()};
    row.onclick=()=>ck.click();
    ml.appendChild(row);
    st.picks.add(m.id);
  });
  up();
}
function up(){const n=st.picks.size;document.getElementById('sc').textContent=n;document.getElementById('gb').disabled=n<2}
init();
</script>
</body>
</html>
